<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Каменный век — Племенные войны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #1a2614; --panel: #24331c; --accent: #ffcc66; --text: #f0f0e8;
    --text-dim: #9aa890; --good: #6fd97a; --bad: #ff6b6b;
    --player: #3a8ad9; --enemy: #d9483a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; }
  button { font-family: inherit; }

  .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* ============ Нижняя навигация ============ */
  #bottom-nav {
    flex-shrink: 0; display: flex; background: var(--panel);
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid #ffffff14;
  }
  #bottom-nav.hidden { display: none; }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; color: var(--text-dim); font-size: 10px; cursor: pointer; padding: 4px 2px;
  }
  .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.nav-btn-main .nav-icon { font-size: 30px; }
  .nav-btn.nav-btn-main { color: var(--text); }
  .nav-btn.nav-btn-main.active { color: var(--accent); }

  #screen-menu { padding: 0; }
  #menu-header-fixed {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    gap: 10px; padding: 20px 20px 10px;
  }
  #menu-scroll {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    align-items: center; gap: 10px; padding: 4px 20px 10px;
  }
  #menu-footer-fixed {
    flex-shrink: 0; display: flex; justify-content: center;
    padding: 10px 20px calc(16px + env(safe-area-inset-bottom, 0px));
  }
  #menu-title-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 320px;
  }
  #screen-menu h1 { font-size: 24px; margin: 0; }
  #menu-gold-display { color: var(--accent); font-size: 17px; font-weight: 700; display:flex;align-items:center;gap:5px; }
  #screen-menu p { color: var(--text-dim); font-size: 13px; margin: 0; text-align: center; }
  .menu-btn {
    width: 100%; max-width: 320px; padding: 16px; border-radius: 14px; border: none;
    background: var(--panel); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .menu-btn .gold { color: var(--accent); font-size: 13px; }
  #btn-go-levels {
    background: var(--accent); color: #2a2010; font-size: 20px; font-weight: 700;
    justify-content: center; padding: 18px; border-radius: 16px;
    letter-spacing: 0.5px; width: 100%; max-width: 320px;
  }
  /* Статичный лейбл эпохи (Уровни/Магазин/Воины) — эпоха теперь меняется
     только в Настройках, здесь просто показываем текущую, без переключателя. */
  .epoch-label {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 15px; color: var(--text-dim); margin-bottom: 4px;
  }

  /* Главный экран — упрощён: эпоха, золото, активный уровень, "В бой!" */
  #menu-active-level { font-size: 22px; font-weight: 700; margin: 4px 0; }

  /* ============ Экран настроек ============ */
  #screen-settings { padding: 16px; gap: 12px; overflow-y: auto; align-items: center; }
  .settings-row {
    width: 100%; max-width: 360px; background: rgba(36,51,28,0.75); border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .settings-row .settings-label { font-size: 14px; }
  .settings-toggle {
    width: 46px; height: 26px; border-radius: 13px; border: none; background: #ffffff30;
    position: relative; cursor: pointer; flex-shrink: 0;
  }
  .settings-toggle::after {
    content: ""; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
    border-radius: 50%; background: #fff; transition: transform 0.15s ease;
  }
  .settings-toggle.on { background: var(--good); }
  .settings-toggle.on::after { transform: translateX(20px); }
  .settings-arrows { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .settings-arrow-btn {
    width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--panel);
    color: var(--text); font-size: 16px; cursor: pointer; flex-shrink: 0;
  }
  .settings-arrow-value { font-size: 14px; min-width: 90px; text-align: center; }
  .settings-select {
    background: var(--panel); color: var(--text); border: 1px solid #ffffff30; border-radius: 8px;
    padding: 6px 8px; font-size: 14px;
  }
  .settings-name-input {
    background: var(--panel); color: var(--text); border: 1px solid #ffffff30; border-radius: 8px;
    padding: 6px 8px; font-size: 14px; width: 140px; text-align: right;
  }
  #settings-feedback-box { width: 100%; max-width: 360px; }
  #settings-feedback-text {
    width: 100%; min-height: 70px; background: rgba(36,51,28,0.75); color: var(--text);
    border: 1px solid #ffffff30; border-radius: 10px; padding: 10px; font-size: 13px; resize: vertical;
    font-family: inherit;
  }
  #settings-feedback-send {
    margin-top: 6px; width: 100%; padding: 10px; border-radius: 10px; border: none;
    background: var(--accent); color: #2a2010; font-weight: 700; cursor: pointer;
  }
  #settings-feedback-status { font-size: 12px; color: var(--good); margin-top: 4px; text-align: center; height: 14px; }
  #settings-reset-btn {
    width: 100%; max-width: 360px; padding: 12px; border-radius: 10px; border: 1px solid var(--bad);
    background: none; color: var(--bad); font-size: 14px; cursor: pointer;
  }

  /* Карточки воинов 2x2 (свои / вражеские) */
  .unit-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .unit-card {
    background: rgba(36,51,28,0.75); border-radius: 12px; padding: 10px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center;
  }
  .unit-card .portrait-wrap { display: flex; align-items: flex-end; justify-content: center; width: 100%; margin-bottom: -6px; }
  .unit-card .portrait { width: auto; object-fit: contain; }
  .unit-card .name { font-size: 13px; font-weight: 700; line-height: 1.2; min-height: 18px; display: flex; align-items: center; }
  .unit-card .desc { font-size: 10px; color: var(--text-dim); line-height: 1.2; min-height: 26px; margin: 2px 0; }
  .unit-card .stat-row {
    display: flex; flex-wrap: nowrap; gap: 0 4px; justify-content: center;
    font-size: 9.5px; color: var(--text); margin-top: 2px; border-top: 1px solid #ffffff14; padding-top: 5px; width: 100%;
    white-space: nowrap; overflow: hidden;
  }
  .unit-card .stat-row span { flex-shrink: 0; }
  .unit-card .stat-row b { color: var(--accent); font-weight: 700; }
  .stat-legend-grid {
    display: grid; grid-template-columns: auto auto; gap: 4px 20px; width: fit-content;
    font-size: 12px; color: #000; padding: 0; margin: 0 auto; text-align: left;
  }

  #screen-levels { padding: 16px; gap: 10px; align-items: center; }
  #screen-levels h2 { margin: 6px 0 10px; }
  .level-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 360px; }
  .level-btn {
    width: 70px; height: 70px; border-radius: 12px; border: 2px solid transparent;
    background: var(--panel); color: var(--text); font-size: 20px; font-weight: 700; cursor: pointer;
  }
  /* Заблокирован (следующий уровень, пока не пройден предыдущий) — серый + прозрачность плашки и рамки */
  .level-btn.locked { background: rgba(90,90,90,0.35); border-color: rgba(60,60,60,0.35); color: rgba(240,240,232,0.5); opacity: 1; cursor: default; }
  /* Доступен, но ещё не пройден — серый, БЕЗ прозрачности */
  .level-btn.unlocked-pending { background: #5a5a5a; border-color: #3a3a3a; }
  .level-btn.active-level { border-width: 4px; }
  /* Пройден — оливковая заливка как раньше, рамка по числу звёзд (переиспользуем цвета, уже есть в палитре) */
  .level-btn.cleared { background: var(--panel); }
  .level-btn.cleared.stars-1 { border-color: var(--bad); }
  .level-btn.cleared.stars-2 { border-color: var(--accent); }
  .level-btn.cleared.stars-3 { border-color: var(--good); }
  .back-link { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 16px; cursor: pointer; }

  #screen-shop { padding: 16px; gap: 10px; overflow-y: auto; }
  .shop-header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 340px; margin: 0 auto; }
  .shop-back-btn { color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer; padding: 6px 4px; }
  #screen-shop h2 { margin: 6px 0; text-align: left; }
  .shop-gold { text-align: center; color: var(--accent); font-size: 20px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .shop-row {
    display: flex; align-items: center; gap: 12px; background: rgba(36,51,28,0.75);
    border-radius: 12px; padding: 10px 12px; cursor: pointer;
  }
  .shop-row.disabled { opacity: 0.4; cursor: default; }
  .shop-row .icon { font-size: 34px; width: 44px; text-align: center; }
  .shop-row .info { flex: 1; }
  .shop-row .info .name { font-size: 14px; font-weight: 600; }
  .shop-row .info .desc { font-size: 11px; color: var(--text-dim); }
  .shop-row .price { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; display: flex; align-items: center; gap: 2px; }

  #battle-controls {
    position: absolute; top: 11%; right: 8px;
    display: flex; gap: 8px; z-index: 20;
  }
  .ctrl-btn {
    border: 2px solid rgba(255,255,255,0.55); border-radius: 9px;
    background: transparent; color: #fff;
    width: 42px; height: 36px; font-size: 17px; cursor: pointer;
    text-shadow: 0 1px 3px #000;
  }
  .ctrl-btn-shop { font-size: 18px; width: 46px; height: 38px; }

  #wave-counter, #kill-values {
    position: absolute; top: 10%; z-index: 20;
    background: transparent;
    padding: 7px 10px;
    font-size: 16px; color: #fff; line-height: 1.7;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  #wave-counter {
    position: absolute; top: 19%; right: 8px; z-index: 20;
    background: transparent; padding: 4px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  .wave-counter-row { display: flex; align-items: center; }
  #kill-values {
    position: absolute; top: 12%; left: 8px; z-index: 20;
    background: transparent; padding: 6px 8px;
    font-size: 17px; color: #fff; line-height: 1.9;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  .mini-stat-line { display: block; }
  .mini-stat-label { color: var(--text-dim); margin-bottom: 3px; display: block; font-size: 11px; }
  #battle-top {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: transparent; gap: 10px;
  }
  .base-hp-wrap { flex: 1; }
  .base-hp-label { font-size: 15px; color: #fff; text-shadow: 0 1px 4px #000, 0 1px 4px #000; font-weight: 600; }
  .base-hp-track { height: 10px; border-radius: 5px; background: #00000040; overflow: hidden; margin-top: 2px; }
  .base-hp-fill { height: 100%; border-radius: 5px; transition: width 0.2s; }
  .base-hp-fill.player { background: var(--player); }
  .base-hp-fill.enemy { background: var(--enemy); }
  #battle-level-label { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; text-align: center; text-shadow: 0 1px 4px #000, 0 1px 4px #000; }
  #battle-gold { font-size: 15px; font-weight: 600; color: var(--accent); text-align: center; white-space: nowrap; text-shadow: 0 1px 3px #000; display: flex; align-items: center; justify-content: center; gap: 4px; }

  .tent {
    position: absolute; bottom: 27%; width: 48%; height: 54%;
    min-width: 120px; max-width: 280px; pointer-events: none;
    z-index: 73;
  }
  .tent.player { left: -22%; }
  .tent.enemy { right: -22%; }
  .tent img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; }

  .coin-fly {
    position: absolute; display: flex; align-items: center; gap: 3px;
    pointer-events: none; z-index: 110;
  }
  .coin-fly img { width: 26px; height: 26px; object-fit: contain; }
  .coin-fly .coin-value { font-size: 11px; color: var(--accent); font-weight: 700; text-shadow: 0 1px 2px #000; }

  #lane-wrap {
    flex: 1; position: relative; overflow: hidden;
  }
  #lane-wrap::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background-image: var(--fight-bg);
    background-size: auto 100%; background-position: center center; background-repeat: no-repeat;
    background-color: var(--bg); /* letterbox по бокам, если картинка уже экрана */
    filter: brightness(1.18) saturate(1.05);
    /* Было auto 135% — зум специально был подобран под калибровку дорожек/
       баз под текущий Fight.png (см. STONEAGE_PROJECT_CONTEXT, открытый
       вопрос №1). Сейчас поставил 100% по прямому запросу — ЗЕМЛЯ/ДОРОЖКА
       на скриншоте может визуально сместиться относительно юнитов и базы,
       это не проверено на устройстве. Если собьётся — нужен новый Fight.png
       под пропорции экрана, а не возврат зума. */
  }
  #hills-svg { display: none; }
  .unit { z-index: 1; }
  .unit {
    position: absolute; width: 46px; height: 46px; margin-left: -23px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; transition: left 0.15s linear, bottom 0.2s ease;
    border: 3px solid #00000030; overflow: visible;
  }
  .unit.side-player { background: var(--player); }
  .unit.side-enemy { background: var(--enemy); }
  .unit .hp-track { position: absolute; top: -10px; left: 2px; right: 2px; height: 4px; background: #00000050; border-radius: 2px; }
  .unit .hp-fill { height: 100%; border-radius: 2px; background: var(--good); }
  .unit.side-player .hp-fill { background: var(--player); }
  .unit.side-enemy .hp-fill { background: var(--enemy); }
  /* unit-halo убран по запросу — эллипс под ногами не нужен */
  .unit:not(.sprite-unit).attacking { animation: unitPunch 0.25s ease-out; }
  @keyframes unitPunch { 0%,100% { transform: scale(1); } 50% { transform: scale(1.22); } }
  .unit.dying { animation: unitDie 0.35s ease-in forwards; }
  @keyframes unitDie { to { opacity: 0; transform: scale(0.3) rotate(40deg); } }

  /* Юниты со спрайтами */
  .unit.sprite-unit {
    width: 38px; height: 4px; margin-left: -19px;
    background: transparent !important; border: none !important; border-radius: 0 !important;
    font-size: 0 !important;
  }
  .unit.sprite-unit .hp-track { top: -50px; left: 0; right: 0; }
  /* Мамонт/рыцарь и птеродактиль/дракон крупнее базового спрайта — наездник
     на них иначе выглядит слишком мелким рядом с пехотой/лучником. Сама
     высота теперь ставится динамически в JS (SPRITE_RATIO × naturalHeight),
     не статичным CSS-значением — см. STONEAGE_ASSET_PIPELINE.md, раздел 8:
     разные фазы (ходьба/атака/смерть) имеют разный холст с разным полем,
     фиксированная высота картинки исказила бы откалиброванный зазор до пола. */
  .unit.sprite-of-Mammoth .hp-track { top: -92px; }
  .unit.sprite-of-Flyer .hp-track { top: -100px; }
  .unit-sprite {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: auto; pointer-events: none;
  }
  .unit-sprite.flipped { transform: translateX(-50%) scaleX(-1); }
  .unit.sprite-unit.dying .unit-sprite { animation: deathBlink 1.1s steps(1,end) forwards; }
  .unit.sprite-unit.dying-fall .unit-sprite:not(.flipped) {
    animation: deathBlink 1.3s steps(1,end) forwards, deathFallMove 1.3s ease-in forwards;
  }
  .unit.sprite-unit.dying-fall .unit-sprite.flipped {
    animation: deathBlink 1.3s steps(1,end) forwards, deathFallMoveFlipped 1.3s ease-in forwards;
  }
  .unit.sprite-unit.dying, .unit.sprite-unit.dying-fall { animation: none; }
  @keyframes deathBlink {
    0%, 20%, 40%, 60% { opacity: 1; }
    10%, 30%, 50% { opacity: 0.15; }
    70%, 100% { opacity: 0; }
  }
  @keyframes deathFallMove { to { transform: translateX(-50%) translateY(70px); } }
  @keyframes deathFallMoveFlipped { to { transform: translateX(-50%) scaleX(-1) translateY(70px); } }

  #battle-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
    background: transparent; padding: 4px 12px 8px;
  }
  #food-bar-wrap { margin-bottom: 4px; }
  #food-label { font-size: 15px; font-weight: 600; color: #fff; display: flex; justify-content: space-between; text-shadow: 0 1px 3px #000; }
  #food-track { height: 6px; border-radius: 4px; background: #00000040; overflow: hidden; margin-top: 2px; }
  #food-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.1s linear; }

  #unit-buttons { display: flex; gap: 6px; }
  .spawn-btn {
    flex: 1; border: 2px solid rgba(255,255,255,0.35); border-radius: 10px;
    background: rgba(255,255,255,0.05); color: var(--text);
    padding: 4px 4px 3px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 0px;
    cursor: pointer;
  }
  .spawn-btn .ic { font-size: 36px; }
  .spawn-btn .cost { color: var(--accent); font-size: 11px; font-weight: 600; text-shadow: 0 1px 2px #000; }
  .spawn-btn.disabled { opacity: 0.35; }
  .spawn-btn.locked { opacity: 0.25; }

  #battle-result {
    position: absolute; inset: 0; background: #00000080; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; padding: 20px;
    z-index: 100;
  }

  .projectile {
    position: absolute; pointer-events: none; z-index: 15;
    width: 38px; height: auto; object-fit: contain;
    transition: left 0.35s linear, opacity 0.35s ease-in;
  }
  /* PNG defringe helper — убрано, т.к. drop-shadow усиливает видимость белого контура */
  #battle-result.show { display: flex; }
  #battle-result h2 { font-size: 26px; margin: 0; }
  #battle-result p { color: var(--text-dim); margin: 0; font-size: 13px; }
  .result-btn {
    padding: 12px 28px; border-radius: 12px; border: none; background: var(--accent);
    color: #2a2010; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .result-btn-secondary { background: var(--panel); color: var(--text); font-weight: 500; font-size: 14px; }

  .legend-item .desc b { color: var(--text); font-size: 12px; }

  .epoch-tabs { display: flex; gap: 8px; width: 100%; max-width: 320px; margin: 0 auto 4px; }
  .epoch-tab {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent;
    background: var(--panel); color: var(--text-dim); font-size: 12px; cursor: pointer;
  }
  .epoch-tab.active { border-color: var(--accent); color: var(--text); font-weight: 700; }
  .epoch-tab.locked { opacity: 0.35; cursor: default; }

  .stars-row .price { color: #ffd966; }
  .shop-section-gap { height: 18px; border-top: 1px solid #ffffff14; margin-top: 6px; }
  .shop-sticky-top {
    position: sticky; top: 0; z-index: 30; background: rgba(26,38,20,0.6);
    padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .shop-row.loading .price { font-size: 18px; }

  /* Оверлей паузы */
  #pause-overlay {
    position: absolute; inset: 0; z-index: 90; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
    cursor: pointer; /* тап в любом месте оверлея снимает паузу, см. JS-обработчик */
  }
  #pause-overlay.show { display: flex; }
  #pause-overlay-icon {
    font-size: 72px; color: #fff; text-shadow: 0 2px 8px #000;
    transition: opacity 0.7s ease;
  }
  #pause-overlay-icon.faded { opacity: 0.35; }
  #pause-overlay-icon.play-fade { opacity: 0; transition: opacity 1.0s ease; }

  #splash-screen {
    position: fixed; inset: 0; z-index: 1000; overflow: hidden;
    display: none; align-items: center; justify-content: center;
    background: #000;
  }
  #splash-screen.show { display: flex; }
  #splash-screen img { height: 100%; width: auto; } /* было width:100%+cover — всегда обрезало по одной оси без полей */
  #splash-spinner {
    position: absolute; bottom: 14%; left: 50%; transform: translateX(-50%);

   эпохах одинаково (не привязаны к эпохе, не сбрасываются кнопкой "Начать
   заново"). Цена — фиксированная за уровень (не растёт), max 5 уровней. */
const STARS_UPGRADE_DEFS = {
  unitSpeed: { name: "Скорость",     icon: "🥾", desc: "+10% скорости передвижения юнитов", baseCostStars: 15, stepCostStars: 0, max: 5 },
  startFood: { name: "Запас еды",    icon: "🍗", desc: "+15 еды в начале каждого боя за уровень", baseCostStars: 15, stepCostStars: 0, max: 5 },
  crit:      { name: "Шанс крита",   icon: "🎯", desc: "+5% шанс удвоенного урона", baseCostStars: 30, stepCostStars: 0, max: 5 },
  bonusGold: { name: "Много золота", icon: "💰", desc: "+15% золота за каждое убийство за уровень", baseCostStars: 30, stepCostStars: 0, max: 5 },
};
function starsUpgradeCost(def, lvl) { return def.baseCostStars + def.stepCostStars * lvl; }

function upgradeDisplayValue(key, lvl) {
  if (key === "dmg" || key === "hp") return "×" + (1 + 0.05 * lvl).toFixed(2);
  if (key === "foodRate") return "×" + (1 + 0.1 * lvl).toFixed(2);
  if (key === "baseHp") return "+" + (20 * lvl) + " HP";
  if (key === "defense") return "-" + (4 * lvl) + "%";
  if (key === "unitSpeed") return "×" + (1 + 0.1 * lvl).toFixed(2);
  if (key === "crit") return (5 * lvl) + "%";
  return String(lvl);
}

/* ============ Реестр эпох ============
   assetKey — имя папки на GitHub (assets/<assetKey>/...), отдельное от
   игрового ключа эпохи ("stone"/"medieval" совпадают сейчас, но это не
   гарантировано на будущее — например, если появятся доп. подветки). */
const EPOCHS = {
  stone: {
    name: "Каменный век", tabIcon: "🪓", assetKey: "stone",
    unitDefs: STONE_UNIT_DEFS, unitOrder: STONE_UNIT_ORDER, levels: STONE_LEVELS,
    goldPerKill: STONE_GOLD_PER_KILL, upgradeDefs: BASE_UPGRADE_DEFS, legend: STONE_LEGEND,
    unitIcons: STONE_UNIT_ICONS,
  },
  medieval: {
    name: "Средневековье", tabIcon: "⚔️", assetKey: "medieval",
    unitDefs: MEDIEVAL_UNIT_DEFS, unitOrder: MEDIEVAL_UNIT_ORDER, levels: MEDIEVAL_LEVELS,
    goldPerKill: MEDIEVAL_GOLD_PER_KILL, upgradeDefs: MEDIEVAL_UPGRADE_DEFS, legend: MEDIEVAL_LEGEND,
    unitIcons: MEDIEVAL_UNIT_ICONS,
  },
};
const EPOCH_ORDER = ["stone", "medieval"];

/* Корень ассетов текущей эпохи, например "assets/stone/" */
function epochAssetRoot(epochKey) {
  return "assets/" + EPOCHS[epochKey || SAVE.currentEpoch].assetKey + "/";
}
/* Путь к ассету текущей (или явно указанной) эпохи, напр. A("ui/Coin_1.png") */
function A(relPath, epochKey) {
  return epochAssetRoot(epochKey) + relPath;
}

/* SVG-шаблоны тента/замка убраны — база теперь реальные PNG (own/enemy,
   5 фаз повреждения), см. BASE_PHASES и updateTentDamage() */

/* Текущие активные конфиги — переключаются applyEpoch() при смене вкладки эпохи.
   Это намеренно `let`, а не `const`: вся остальная логика обращается к ним
   по этим именам и не должна знать про эпохи напрямую. */
let UNIT_DEFS, UNIT_ORDER, LEVELS, GOLD_PER_KILL, UPGRADE_DEFS, UNIT_LEGEND_TEXT, UNIT_ICONS;

function applyEpoch(key) {
  const ep = EPOCHS[key];
  UNIT_DEFS = ep.unitDefs;
  UNIT_ORDER = ep.unitOrder;
  LEVELS = ep.levels;
  GOLD_PER_KILL = ep.goldPerKill;
  UPGRADE_DEFS = ep.upgradeDefs;
  UNIT_LEGEND_TEXT = ep.legend;
  UNIT_ICONS = {};
  for (const k in (ep.unitIcons || {})) UNIT_ICONS[k] = A(ep.unitIcons[k], key);
  UPGRADE_ICON_SRCS = {
    foodRate: A("icons/Upgrade_1.png", key),
    dmg:      A("icons/Upgrade_2.png", key),
    hp:       A("icons/Upgrade_3.png", key),
    baseHp:   A("icons/Upgrade_4.png", key),
    defense:  A("icons/Upgrade_5.png", key),
  };
  applyEpochBackgrounds(key);

  // Имена/описания юнитов и апгрейдов — на текущем языке (SAVE.language).
  // Заодно перевызывается при смене языка (см. applyLanguage), не только
  // при смене эпохи — единая точка обновления текста в этих объектах.
  UNIT_ORDER.forEach((k) => {
    UNIT_DEFS[k].name = t("unit." + k + ".name");
    UNIT_LEGEND_TEXT[k] = t("unit." + k + ".desc");
  });
  for (const k in UPGRADE_DEFS) {
    UPGRADE_DEFS[k].name = t("upgrade." + k + ".name");
    UPGRADE_DEFS[k].desc = t("upgrade." + k + ".desc");
  }
  for (const k in STARS_UPGRADE_DEFS) {
    STARS_UPGRADE_DEFS[k].name = t("upgrade." + k + ".name");
    STARS_UPGRADE_DEFS[k].desc = t("upgrade." + k + ".desc");
  }
}

/* Обновляет статичные текстовые узлы разметки (те, что не пересобираются
   каждый раз через render*()) — вызывается при старте и при смене языка. */

/* Смена языка интерфейса — сохраняет выбор и перерисовывает всё видимое.
   Переиспользует applyEpoch() (он же обновляет имена/описания юнитов и
   апгрейдов на нужном языке) плюс статичные узлы разметки. Экран боя не
   трогаем на лету — язык подхватится с начала следующего боя, чтобы не
   ломать уже идущую анимацию/состояние посреди боя. */
function applyLanguage(lang) {
  if (!SUPPORTED_LANGUAGES.includes(lang)) return;
  SAVE.language = lang;
  writeSave(SAVE);
  applyEpoch(SAVE.currentEpoch);
  refreshStaticUiText();
  // Перерисовываем тот экран, что сейчас реально виден
  if (el("screen-menu").classList.contains("active")) renderMenu();
  else if (el("screen-levels").classList.contains("active")) renderLevels();
  else if (el("screen-shop").classList.contains("active")) renderShop();
  else if (el("screen-warriors").classList.contains("active")) renderWarriors();
  else if (el("screen-settings").classList.contains("active")) renderSettings();
}

/* Фоны меню/магазина/воинов/боя — по эпохе. */
function applyEpochBackgrounds(key) {
  el("screen-menu").style.backgroundImage = 'url(' + A("backgrounds/Menu.png", key) + ')';
  el("screen-shop").style.backgroundImage = 'url(' + A("backgrounds/Shop.png", key) + ')';
  el("screen-warriors").style.backgroundImage = 'url(' + A("backgrounds/Menu.png", key) + ')';
  el("lane-wrap").style.setProperty('--fight-bg', 'url(' + A("backgrounds/Fight.png", key) + ')');
  const foodIconName = key === "stone" ? "Food_2" : "Food_1"; // Каменный век — новая иконка еды по запросу
  el("food-icon-label").innerHTML = '<img src="' + A("ui/" + foodIconName + ".png", key) + '" style="width:40px;height:40px;object-fit:contain;vertical-align:middle;"> ' + t("battle.food");
}

/* t(key, vars) — строка на текущем языке (SAVE.language), с подстановкой
   {var} из vars. Если ключа нет вообще — предупреждение в консоль и сам
   ключ (чтобы сразу было видно в интерфейсе, что забыли завести перевод).
   Если ключ есть, но нет перевода на нужный язык — "[!]" + русский текст:
   явный маркер прямо в интерфейсе, не тихий откат (см. решение по п.3). */
function t(key, vars) {
  const entry = STRINGS[key];
  if (!entry) { console.warn("i18n: нет ключа", key); return key; }
  let s = entry[SAVE.language];
  if (s === undefined) s = "[!]" + (entry.ru !== undefined ? entry.ru : key);
  if (vars) for (const k in vars) s = s.split("{" + k + "}").join(vars[k]);
  return s;
}

/* Множественное число — правила разные по языкам (ru: 3 формы, en/es: 2,
   zh: форм нет). Пока нигде в живом тексте не используется (нет строк с
   счётчиком количества), но инфраструктура готова на будущее — key должен
   указывать на массив из нужного числа форм на каждом языке. */
const PLURAL_RULE = {
  ru: (n) => (n % 10 === 1 && n % 100 !== 11) ? 0 : (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) ? 1 : 2,
  en: (n) => n === 1 ? 0 : 1,
  es: (n) => n === 1 ? 0 : 1,
  zh: () => 0,
};
function plural(n, forms) {
  const idx = (PLURAL_RULE[SAVE.language] || PLURAL_RULE.ru)(n);
  return (forms[idx] !== undefined ? forms[idx] : forms[forms.length - 1]).replace("{n}", n);
}

/* ============ Сохранение ============ */
const SAVE_KEY = "stoneage_save_v2";
const SAVE_KEY_OLD = "stoneage_save_v1"; // формат до введения эпох — для миграции

/* Концепция сложности убрана (см. п.21 доработок) — уровень врагов
   фиксирован, равен тому, что раньше было "Нормально". Баланс — отдельная
   задача на будущее, сейчас не трогаем числа. */
const ENEMY_LEVEL = { hpMul: 0.56, atkMul: 0.58, foodMul: 1.25 };

function freshEpochState(epochKey) {
  const ep = EPOCHS[epochKey];
  const unlocked = {};
  ep.unitOrder.forEach((k) => { unlocked[k] = !!ep.unitDefs[k].alwaysUnlocked; });
  const upgrades = {};
  Object.keys(ep.upgradeDefs).forEach((k) => { upgrades[k] = 0; });
  return { clearedLevels: 0, levelBestStars: {}, unlocked, upgrades };
}

const DEFAULT_SAVE = {
  gold: 0,
  currentEpoch: "stone",
  language: "ru", // ru/en/zh/es — выбор языка интерфейса
  playerName: "player", // редактируется в Настройках, шлётся в аналитику ДОПОЛНИТЕЛЬНО к телеграм-id, не вместо него
  vibrationEnabled: true, // управляет только triggerHitHaptic() — вибрация при ударе по своей базе
  confirmExitBattle: true, // спрашивать подтверждение перед выходом из боя кнопкой ✕
  defaultBattleSpeed: 1, // 1/2/3 — стартовая скорость боя, настраивается в Настройках; во время боя можно сменить кнопкой, это не переписывает дефолт

  starsUpgrades: { startFood: 0, bonusGold: 0, unitSpeed: 0, crit: 0 },

};

const memoryStore = {};
const safeStorage = {
  getItem(key) { try { return localStorage.getItem(key); } catch (e) { return memoryStore[key] ?? null; } },
  setItem(key, value) { try { localStorage.setItem(key, value); } catch (e) { memoryStore[key] = value; } },
};

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function loadSave() {
  let raw = safeStorage.getItem(SAVE_KEY);
  let data = null;
  if (raw) {
    try { data = JSON.parse(raw); } catch (e) { data = null; }
  }

  // Новый формат уже есть — аккуратно подмешиваем дефолты (на случай новых полей)
  if (data && data.epochs) {
    const merged = deepClone(DEFAULT_SAVE);
    merged.gold = data.gold ?? 0;
    merged.difficulty = data.difficulty || "normal";
    merged.currentEpoch = data.currentEpoch || "stone";
    merged.language = SUPPORTED_LANGUAGES.includes(data.language) ? data.language : "ru";
    merged.playerName = (typeof data.playerName === "string" && data.playerName.trim()) ? data.playerName.trim().slice(0, 24) : "player";
    merged.vibrationEnabled = data.vibrationEnabled !== false; // по умолчанию true, если поля ещё нет
    merged.confirmExitBattle = data.confirmExitBattle !== false; // по умолчанию true
    merged.defaultBattleSpeed = [1, 2, 3].includes(data.defaultBattleSpeed) ? data.defaultBattleSpeed : 1;

    merged.starsUpgrades = Object.assign({}, DEFAULT_SAVE.starsUpgrades, data.starsUpgrades);
    // обратная совместимость: раньше это были true/false, теперь уровень 0-5
    ["startFood", "bonusGold"].forEach((k) => {
      if (merged.starsUpgrades[k] === true) merged.starsUpgrades[k] = 1;
      if (merged.starsUpgrades[k] === false) merged.starsUpgrades[k] = 0;
    });
    EPOCH_ORDER.forEach((epKey) => {
      const fresh = freshEpochState(epKey);
      const epData = (data.epochs && data.epochs[epKey]) || {};
      merged.epochs[epKey] = {
        clearedLevels: epData.clearedLevels || 0,
        levelBestStars: Object.assign({}, epData.levelBestStars),
        unlocked: Object.assign({}, fresh.unlocked, epData.unlocked),
        upgrades: Object.assign({}, fresh.upgrades, epData.upgrades),
      };
    });    return merged;
  }

  // Старый формат (одна эпоха, до этого обновления) — мигрируем без потери прогресса
  const oldRaw = safeStorage.getItem(SAVE_KEY_OLD);
  if (oldRaw) {
    try {
      const old = JSON.parse(oldRaw);
      const migrated = deepClone(DEFAULT_SAVE);
      migrated.gold = old.gold ?? 0;
      migrated.currentEpoch = "stone";
      migrated.epochs.stone.clearedLevels = old.clearedLevels || 0;
      migrated.epochs.stone.unlocked = Object.assign({}, migrated.epochs.stone.unlocked, old.unlocked);
      migrated.epochs.stone.upgrades = Object.assign({}, migrated.epochs.stone.upgrades, old.upgrades);
      return migrated;
    } catch (e) { /* поломанный старый сейв — игнорируем, начинаем с чистого */ }
  }

  return deepClone(DEFAULT_SAVE);
}

function writeSave(save) { safeStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

/* ===== ВРЕМЕННЫЙ ДЕБАГ (п.9 запроса) =====
   При каждом запуске откатываем прохождение уровней 5,6,7 (индексы 4,5,6)
   в ОБЕИХ эпохах, если они были пройдены — чтобы можно было тестировать их
   заново. Эпоха в запросе не была уточнена, применил к обеим на всякий
   случай — [идея] если нужно только для одной, скажи. УБРАТЬ этот блок
   целиком, когда тестирование закончится (ищи по этому комментарию).
   ========================================== */
["stone", "medieval"].forEach((epochKey) => {
  const epData = SAVE.epochs[epochKey];
  if (!epData) return;
  epData.clearedLevels = Math.min(epData.clearedLevels, 4); // level5 = индекс 4 → блокирует и level6/7 тоже, как обычная игровая логика
  [4, 5, 6].forEach((idx) => { delete epData.levelBestStars[idx]; });
});
writeSave(SAVE);
/* ===== КОНЕЦ ВРЕМЕННОГО ДЕБАГА ===== */

/* EP() — состояние ТЕКУЩЕЙ (или явно указанной) эпохи: уровни, прокачки, разблокировки */
function EP(epochKey) { return SAVE.epochs[epochKey || SAVE.currentEpoch]; }

function upgradeCost(key) {
  const def = UPGRADE_DEFS[key];
  const lvl = EP().upgrades[key] || 0;
  return Math.round(def.baseCost * Math.pow(def.mul, lvl));
}

function dmgMul() { return 1 + 0.05 * (EP().upgrades.dmg || 0); }
function hpMul() { return 1 + 0.05 * (EP().upgrades.hp || 0); }
function baseHpBonus() { return 20 * (EP().upgrades.baseHp || 0); }
function foodRateMul() { return 1 + 0.1 * (EP().upgrades.foodRate || 0); }
function defenseMul() { return Math.max(0.2, 1 - 0.04 * (EP().upgrades.defense || 0)); }
function unitSpeedMul() { return 1 + 0.1 * (SAVE.starsUpgrades.unitSpeed || 0); }
function critChance() { return Math.min(0.6, 0.05 * (SAVE.starsUpgrades.crit || 0)); }

/* ============ Заставка загрузки ============
   Показывается: (1) при старте игры, до появления меню; (2) перед каждым
   стартом боя (уровень, "Дальше", "Повторить" и т.п.). Не менее 1 секунды
   даже если ассеты уже в кэше браузера. Картинка заставки общая на игру
   (не по эпохам) — assets/shared/splash.png. */
const SPLASH_MIN_MS = 2000;
let splashImgSet = false;

function preloadImages(srcs) {
  return Promise.all(srcs.map((src) => new Promise((resolve) => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve; // не блокируем показ игры, если один из ассетов не загрузился
    img.src = src;
  })));
}

function showSplash(assetPromise) {

    el("splash-img").src = "assets/shared/splash.png";
    splashImgSet = true;

  el("splash-screen").classList.add("show");
  const minWait = new Promise((resolve) => setTimeout(resolve, SPLASH_MIN_MS));
  return Promise.all([assetPromise, minWait]).then(() => {

}

/* Тактильный отклик при ударе по базе игрока. Внутри Telegram — нативный
   HapticFeedback (работает надёжнее в WebView, чем navigator.vibrate).
   Вне Telegram (тест в обычном браузере) — откат на navigator.vibrate. */
function triggerHitHaptic() {

  if (tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {

}

const SPRITE_MAP = {

  swordsman: "Warrior", crossbow: "Archer", knight: "Mammoth", dragon: "Flyer",

/* RATIO = целевая_высота_на_экране / рост_силуэта_на_кадре_ходьбы (см.
   STONEAGE_ASSET_PIPELINE.md, раздел 3 "Зазор до пола"). Пересчитано под
   целевые 44/44/65/51px (старые размеры до многокадровой системы) —
   поправить здесь, если понадобится другой размер (одна точка изменения). */
const SPRITE_RATIO = {

  Mammoth: 0.3234,
  Flyer:   0.2982,
};

/* Размеры холста (naturalWidth x naturalHeight) по (персонаж, фаза) — нужны
   чтобы выставлять CSS-высоту СИНХРОННО, до загрузки картинки браузером.
   Без этого при каждой смене src кадр на долю секунды показывается в
   нативном (огромном) размере файла, потом "прыгает" до нужного через
   onload — заметная вспышка при каждом новом заспавненном юните. */
const SPRITE_CANVAS_SIZE = {
  Warrior: { walk: [222,249], attack: [514,315], death: [523,327] },
  Archer:  { walk: [200,275], attack: [247,274], death: [507,278] },
  Mammoth: { walk: [207,242], attack: [245,264], death: [322,241] },
  Flyer:   { walk: [249,294], attack: [304,322], death: [255,288] },
};

/* Ставит кадр спрайта юниту: путь + высота СИНХРОННО, без мигания размера
   при загрузке. Единая точка для всех мест, где меняется src спрайта. */
function setUnitSpriteFrame(unit, phase, frame) {
  if (!unit.spriteEl || !unit.spriteName) return;
  const ratio = SPRITE_RATIO[unit.spriteName] || 0.2;
  const size = SPRITE_CANVAS_SIZE[unit.spriteName][phase];
  // ОТКАТ: раньше здесь пробовали ставить ширину синхронно вместе с высотой
  // (гипотеза — "воин увеличивается" из-заauto-ширины при первой загрузке
  // файла). Роман сообщил, что после этой правки воин стал ещё и ШИРЕ —
  // гипотеза не подтвердилась, откатываю обратно на "только высота", как
  // было раньше. Отдельно нашёл вероятную РЕАЛЬНУЮ причину — см. VERSION-
  // комментарий и SPRITE_CANVAS_SIZE: у Warrior разница между холстом
  // ходьбы (222×249) и атаки (514×315) непропорционально больше, чем у
  // остальных юнитов (~1.2× по ширине против 2.3× у воина) — это не
  // подтверждено визуально по файлам (нет доступа), нужно перепроверить
  // сами PNG.
  if (size) unit.spriteEl.style.height = (size[1] * ratio) + "px";
  unit.spriteEl.src = spriteFramePath(unit.spriteName, unit.spriteSide, phase, frame);
}

    });
  }, ANIM_FRAME_MS);

/* Карточки своих воинов 2x2, с учётом текущей прокачки игрока. */
function renderUnitCards(containerId) {
  const container = el(containerId);
  container.innerHTML = "";
  const grid = document.createElement("div");
  grid.className = "unit-card-grid";

  // Реальная высота портрета каждого юнита — пропорционально бою (та же
  // формула, что уже была). Карточки должны быть одинакового размера, но
  // юниты между собой — с сохранением боевых пропорций (п.8, вариант 1,
  // подтверждено пользователем) — значит выравниваем не сам спрайт, а
  // область ПОД ним: фиксированная высота-обёртка под самый крупный спрайт,
  // спрайт внутри прижат к низу (как пол в бою), у более мелких юнитов
  // сверху остаётся пустое место.
  const CARD_PORTRAIT_LIFT = { Flyer: 10 }; // птеродактиль летает — немного приподнят над "полом" карточки
  const portraitHeights = {};
  UNIT_ORDER.forEach((key) => {
    const spriteName = SPRITE_MAP[key];
    if (!spriteName) { portraitHeights[key] = 0; return; }
    const cardRatio = SPRITE_RATIO[spriteName] * 1.35; // +35% (в диапазоне 20-50%, п.23)
    const canvasH = SPRITE_CANVAS_SIZE[spriteName].walk[1];
    portraitHeights[key] = Math.round(canvasH * cardRatio);
  });
  const maxPortraitWrapHeight = Math.max(...UNIT_ORDER.map((key) => portraitHeights[key]));

  UNIT_ORDER.forEach((key) => {
    const def = UNIT_DEFS[key];
    const spriteName = SPRITE_MAP[key];
    const portraitSrc = spriteName ? spriteFramePath(spriteName, "own", "walk", 1) : null;
    const hp = Math.round(def.hp * hpMul());
    const atk = Math.round(def.atk * dmgMul());
    const speed = +(def.speed * unitSpeedMul()).toFixed(2);
    const cc = Math.round(critChance() * 100);
    const critLine = cc > 0 ? statLine("🎯" + t("stat.crit"), cc + "%") : "";
    const card = document.createElement("div");
    card.className = "unit-card";
    const portraitHeight = portraitHeights[key];
    const lift = spriteName ? (CARD_PORTRAIT_LIFT[spriteName] || 0) : 0;
    const portraitStyle = spriteName ? ' style="height:' + portraitHeight + 'px;margin-bottom:' + lift + 'px;"' : '';
    const portraitId = spriteName ? ' id="cardimg-' + key + '" data-sprite="' + spriteName + '"' : '';
    const portraitWrapStyle = spriteName ? ' style="height:' + maxPortraitWrapHeight + 'px;"' : '';
    const portraitHtml = portraitSrc
      ? '<div class="portrait-wrap"' + portraitWrapStyle + '><img class="portrait"' + portraitId + portraitStyle + ' src="' + portraitSrc + '"></div>'
      : '<div style="font-size:44px;">' + def.icon + '</div>';
    card.innerHTML =
      portraitHtml +
      '<div class="name">' + def.name + '</div>' +
      '<div class="desc">' + UNIT_LEGEND_TEXT[key] + '</div>' +
      '<div class="stat-row">' +
        statLine("❤️", hp) + statLine("⚔️", atk) + statLine("👟", speed) + statLine("📏", def.range) + critLine +
      '</div>';
    grid.appendChild(card);
  });
  container.appendChild(grid);

  const spacerTop = document.createElement("div");
  spacerTop.style.flexGrow = "1";
  container.appendChild(spacerTop);

  const legend = document.createElement("div");
  legend.className = "stat-legend-grid";
  legend.innerHTML =
    '<div>❤️ ' + t("stat.hp") + '</div><div>⚔️ ' + t("stat.atk") + '</div><div>👟 ' + t("stat.speed") + '</div><div>📏 ' + t("stat.range") + '</div>';
  container.appendChild(legend);

  const spacerBottom = document.createElement("div");
  spacerBottom.style.flexGrow = "1";
  container.appendChild(spacerBottom);
}

/* Смена эпохи из Настроек — со стрелочками, циклически по EPOCH_ORDER,
   пропуская ещё не разблокированные эпохи. Показывает заставку загрузки
   (Menu.png нужной эпохи), пока переключение не применится — та же
   заставка, что при старте игры/бое, для убедительности перехода. */
function changeEpochFromSettings(dir) {
  const order = EPOCH_ORDER;
  let idx = order.indexOf(SAVE.currentEpoch);
  for (let i = 0; i < order.length; i++) {
    idx = (idx + dir + order.length) % order.length;
    if (isEpochUnlocked(order[idx])) break;
  }
  const nextKey = order[idx];
  if (nextKey === SAVE.currentEpoch) return;
  showSplash(preloadImages([A("backgrounds/Menu.png", nextKey)])).then(() => {
    switchEpoch(nextKey);
    refreshStaticUiText();
    renderSettings();
  });
}
el("settings-epoch-prev").addEventListener("click", () => changeEpochFromSettings(-1));
el("settings-epoch-next").addEventListener("click", () => changeEpochFromSettings(1));

/* Звёзды за уровень — по % оставшегося HP своей базы на момент победы
   (см. п.21 доработок): >90% - 3 звезды, 50-90% - 2, <50% - 1. */
const STAR_COLOR = "#ffcc66";
function starsForHpFraction(frac) {
  if (frac > 0.9) return 3;
  if (frac >= 0.5) return 2;
  return 1;
}

/* ============ Вкладки эпох (общие для экрана уровней и магазина) ============ */
function isEpochUnlocked(epochKey) {
  const idx = EPOCH_ORDER.indexOf(epochKey);
  if (idx <= 0) return true;
  const prevKey = EPOCH_ORDER[idx - 1];
  return SAVE.epochs[prevKey].clearedLevels >= EPOCHS[prevKey].levels.length;
}

function switchEpoch(key) {
  SAVE.currentEpoch = key;
  applyEpoch(key);
  writeSave(SAVE);
}

function recordLevelStars(levelIndex, stars) {
  const prev = EP().levelBestStars[levelIndex] || 0;
  if (stars > prev) EP().levelBestStars[levelIndex] = stars;
}

function renderLevels() {
  el("epoch-label-levels").textContent = EPOCHS[SAVE.currentEpoch].tabIcon + " " + t("epoch." + SAVE.currentEpoch);
  const row = el("level-row");
  row.innerHTML = "";
  const cleared = EP().clearedLevels;
  for (let i = 0; i < LEVELS.length; i++) {
    const btn = document.createElement("button");
    const isCleared = i < cleared;
    const locked = i > cleared;
    const unlockedPending = !isCleared && !locked; // доступен, но ещё не пройден = АКТИВНЫЙ уровень (ровно один такой)
    const bestStars = EP().levelBestStars[i];
    let cls = "level-btn";
    if (locked) cls += " locked";
    else if (unlockedPending) cls += " unlocked-pending active-level";
    else if (isCleared) cls += " cleared stars-" + (bestStars || 1);
    btn.className = cls;
    if (bestStars) {
      const stars = "★".repeat(bestStars);
      btn.innerHTML = String(i + 1) + '<div style="font-size:10px; color:' + STAR_COLOR + ';">' + stars + '</div>';
    } else {
      btn.textContent = String(i + 1);
    }
    if (!locked) btn.addEventListener("click", () => startBattle(i));
    row.appendChild(btn);
  }
}

/* ============ Магазин ============ */
/* Общая функция для Stars-инвойса — используется в buyWithStars,
   topUpWithStars и рекламных апгрейдах. Логирует любой статус для диагностики. */
function openStarsInvoice({ title, description, payload, amount, onPaid }) {
  if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.openInvoice) {
    window.alert(t("stars.onlyInTelegram"));
    return;
  }
  fetch("https://api.telegram.org/bot" + ANALYTICS_BOT_TOKEN + "/createInvoiceLink", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title, description, payload, currency: "XTR",
      prices: [{ label: title, amount }],
    }),
  }).then((r) => r.json()).then((data) => {
    if (!data.ok) { window.alert(t("stars.invoiceError", { err: data.description || "?" })); return; }
    window.Telegram.WebApp.openInvoice(data.result, (status) => {
      // Диагностика: логируем любой статус, не только "paid"
      sendAnalytics("⭐ Stars invoice статус: " + status + " | payload: " + payload + " | " + getPlayerLabel());
      if (status === "paid") onPaid();
    });
  }).catch((e) => { window.alert(t("stars.networkError", { err: e.message })); });
}

function buyWithStars(key, def) {
  const lvl = SAVE.starsUpgrades[key] || 0;
  if (lvl >= def.max) return;
  const cost = starsUpgradeCost(def, lvl);
  openStarsInvoice({
    title: def.name,
    description: def.desc,
    payload: key + ":" + (lvl + 1),
    amount: cost,
    onPaid: () => {
      SAVE.starsUpgrades[key] = lvl + 1;
      writeSave(SAVE);
      sessionStarsPurchases.push(def.name + " уровень " + (lvl + 1));
      renderShop();
    },
  });
}

/* Дозакупка монет за звёзды когда не хватает.
   Коэффициент: 1⭐ = 10🪙, округление вверх до целой звезды. */
const STARS_TO_COINS_RATE = 10;
function topUpWithStars(deficit, onSuccess) {
  const stars = Math.ceil(deficit / STARS_TO_COINS_RATE);
  const coins = stars * STARS_TO_COINS_RATE;
  const ok = window.confirm(t("stars.notEnough", { deficit, coins, stars }));
  if (!ok) return;
  openStarsInvoice({
    title: t("stars.coinsTitle"),
    description: t("stars.coinsDesc", { coins }),
    payload: "topup_coins:" + coins,
    amount: stars,
    onPaid: () => {
      SAVE.gold += coins;
      writeSave(SAVE);
      sessionStarsPurchases.push("Монеты +" + coins);
      renderShop();
      onSuccess && onSuccess();
    },
  });
}

/* Маппинг ключей апгрейдов → иконки. Нумерация файлов (Upgrade_1..5)
   теперь СОВПАДАЕТ с порядком показа в магазине (BASE_UPGRADE_DEFS):
   1=еда, 2=урон, 3=здоровье, 4=база, 5=защита. */

function iconTag(src, size) {
  return '<img src="' + src + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;vertical-align:middle;filter:drop-shadow(0 0 1px rgba(0,0,0,0.4));">';
}

function renderShop() {
  el("epoch-label-shop").textContent = EPOCHS[SAVE.currentEpoch].tabIcon + " " + t("epoch." + SAVE.currentEpoch);
  el("shop-gold-label").innerHTML = coinImg(34) + " " + SAVE.gold;
  const list = el("shop-list");
  list.innerHTML = "";

  Object.keys(UPGRADE_DEFS).forEach((key) => {
    const def = UPGRADE_DEFS[key];
    const lvl = EP().upgrades[key] || 0;
    const maxed = lvl >= def.max;
    const cost = maxed ? 0 : upgradeCost(key);
    const row = document.createElement("div");
    row.className = "shop-row" + (maxed || SAVE.gold < cost ? " disabled" : "");
    const upgradeIcon = UPGRADE_ICON_SRCS[key] ? iconTag(UPGRADE_ICON_SRCS[key], 54) : def.icon;
    row.innerHTML =
      '<div class="icon">' + upgradeIcon + '</div>' +
      '<div class="info"><div class="name">' + def.name + ' · ' + t("shop.lvlSuffix", { n: lvl }) + '</div>' +
      '<div class="desc">' + def.desc + '<br>' +
      '<span style="color:var(--text-dim);">' + upgradeDisplayValue(key, lvl) + '</span>' +
      (maxed ? '' : ' <span style="color:var(--accent);">→ ' + upgradeDisplayValue(key, lvl + 1) + '</span>') +
      '</div></div>' +
      '<div class="price">' + (maxed ? t("shop.max") : coinImg(20) + " " + cost) + '</div>';
    if (!maxed) {
      row.addEventListener("click", () => {
        if (SAVE.gold < cost) {
          topUpWithStars(cost - SAVE.gold, () => {
            // после дозакупки монет пробуем купить апгрейд снова
            if (SAVE.gold >= cost) {
              SAVE.gold -= cost;
              EP().upgrades[key] = lvl + 1;
              writeSave(SAVE);
              renderShop();
            }
          });
          return;
        }
        SAVE.gold -= cost;
        EP().upgrades[key] = lvl + 1;
        writeSave(SAVE);
        renderShop();
      });
    }
    list.appendChild(row);
  });

  list.appendChild(document.createElement("div")).className = "shop-section-gap";
  UNIT_ORDER.filter((k) => !UNIT_DEFS[k].alwaysUnlocked).forEach((key) => {
    const def = UNIT_DEFS[key];
    const unlocked = EP().unlocked[key];
    const cost = def.unlockCost;
    const row = document.createElement("div");
    row.className = "shop-row" + (unlocked || SAVE.gold < cost ? " disabled" : "");
    const unitIcon = UNIT_ICONS[key] ? iconTag(UNIT_ICONS[key], 40) : def.icon;
    row.innerHTML =
      '<div class="icon">' + unitIcon + '</div>' +
      '<div class="info"><div class="name">' + def.name + '</div>' +
      '<div class="desc">' + (unlocked ? t("shop.unlocked") : t("shop.unlockNewUnit")) + '</div></div>' +
      '<div class="price">' + (unlocked ? "✅" : coinImg(20) + " " + cost) + '</div>';
    if (!unlocked) {
      row.addEventListener("click", () => {
        if (SAVE.gold < cost) {
          topUpWithStars(cost - SAVE.gold, () => {
            if (SAVE.gold >= cost) {
              SAVE.gold -= cost;
              EP().unlocked[key] = true;
              writeSave(SAVE);
              renderShop();
            }
          });
          return;
        }
        SAVE.gold -= cost;
        EP().unlocked[key] = true;
        writeSave(SAVE);
        renderShop();
      });
    }
    list.appendChild(row);
  });

  // Покупки за Stars — единый набор из 4, теперь для обеих эпох одинаково.
  list.appendChild(document.createElement("div")).className = "shop-section-gap";
  Object.keys(STARS_UPGRADE_DEFS).forEach((key) => {
    const def = STARS_UPGRADE_DEFS[key];
    const lvl = SAVE.starsUpgrades[key] || 0;
    const maxed = lvl >= def.max;
    const cost = maxed ? 0 : starsUpgradeCost(def, lvl);
    const row = document.createElement("div");
    row.className = "shop-row stars-row" + (maxed ? " disabled" : "");
    row.innerHTML =
      '<div class="icon">' + def.icon + '</div>' +
      '<div class="info"><div class="name">' + def.name + ' · ' + t("shop.lvlSuffix", { n: lvl }) + '</div>' +
      '<div class="desc">' + def.desc + '</div></div>' +
      '<div class="price">' + (maxed ? t("shop.max") : "⭐ " + cost) + '</div>';
    if (!maxed) row.addEventListener("click", () => buyWithStars(key, def));
    list.appendChild(row);
  });
}

/* ============ Боевой движок ============

   краю, а с отступом — воины подходят к шатру/замку и бьют его, а не пустой край экрана. */
const BASE_POS = { player: 25, enemy: 75 }; // точка удара базы — 25% от края (п.7), юниты останавливаются здесь и атакуют

const SIDE_COLORS = {

};

function startBattleInner(levelIndex) {

    enemyHpMax: 100 * levelDef.hpMul * diff.hpMul,
    food: 15 * (SAVE.starsUpgrades.startFood || 0),
    foodCycleProgress: 0,
    foodCycleSeconds: 0.77 / (foodRateMul() * diff.foodMul),
    units: [],
    nextId: 1,
    waveQueue: levelDef.waves.slice(),
    elapsed: 0,
    over: false,
    laneCounters: {},
    speedMul: selectedSpeedMul,
    spawnedByPlayer: {},

  el("tent-player").innerHTML = '<img src="' + A("base/Base_own_intact.png") + '" class="base-img">';
  el("tent-enemy").innerHTML = '<img src="' + A("base/Base_enemy_intact.png") + '" class="base-img">';

  el("tent-enemy").className = "tent enemy";
