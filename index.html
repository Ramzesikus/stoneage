<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Каменный век — Племенные войны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #1a2614; --panel: #24331c; --accent: #ffcc66; --text: #f0f0e8;
    --text-dim: #9aa890; --good: #6fd97a; --bad: #ff6b6b;
    --player: #3a8ad9; --enemy: #d9483a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; }
  button { font-family: inherit; }

  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  #screen-menu { padding: 0; }
  #menu-header-fixed {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    gap: 10px; padding: 20px 20px 10px;
  }
  #menu-scroll {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    align-items: center; gap: 10px; padding: 4px 20px 10px;
  }
  #menu-footer-fixed {
    flex-shrink: 0; display: flex; justify-content: center;
    padding: 10px 20px calc(16px + env(safe-area-inset-bottom, 0px));
  }
  #menu-title-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 320px;
  }
  #screen-menu h1 { font-size: 24px; margin: 0; }
  #menu-gold-display { color: var(--accent); font-size: 17px; font-weight: 700; display:flex;align-items:center;gap:5px; }
  #screen-menu p { color: var(--text-dim); font-size: 13px; margin: 0; text-align: center; }
  .menu-btn {
    width: 100%; max-width: 320px; padding: 16px; border-radius: 14px; border: none;
    background: var(--panel); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .menu-btn .gold { color: var(--accent); font-size: 13px; }
  #btn-go-levels {
    background: var(--accent); color: #2a2010; font-size: 20px; font-weight: 700;
    justify-content: center; padding: 18px; border-radius: 16px;
    letter-spacing: 0.5px; width: 100%; max-width: 320px;
  }
  /* Вкладки описания воинов */
  #menu-info-tabs { display: flex; gap: 6px; width: 100%; max-width: 320px; }
  .menu-info-tab {
    flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--panel);
    background: transparent; color: var(--text-dim); font-size: 12px; cursor: pointer; text-align: center;
  }
  .menu-info-tab.active { background: var(--panel); color: var(--text); }
  #menu-hq-content, #menu-unit-legend {
    width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  #menu-hq-content { flex: 1; min-height: 320px; }
  #menu-unit-legend { flex: 1; min-height: 320px; }
  .menu-hq-spacer { flex-shrink: 0; }


  /* Вторичные кнопки (Сброс + Магазин), теперь внутри вкладки Штаб */
  #menu-secondary-row {
    display: flex; justify-content: center; gap: 40px; align-items: flex-end;
    width: 100%; max-width: 320px;
  }
  .menu-sec-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; color: var(--text-dim); padding: 4px 8px;
  }
  .menu-sec-btn img { width: 60px; height: 60px; object-fit: contain; }
  .menu-sec-btn .sec-icon { font-size: 40px; line-height: 1; }
  .menu-sec-btn span { font-size: 12px; color: #000; }

  /* Карточки воинов 2x2 (свои / вражеские) */
  .unit-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .unit-card {
    background: var(--panel); border-radius: 12px; padding: 10px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center;
  }
  .unit-card .portrait { width: auto; object-fit: contain; margin-bottom: -6px; }
  .unit-card .name { font-size: 13px; font-weight: 700; line-height: 1.2; min-height: 18px; display: flex; align-items: center; }
  .unit-card .desc { font-size: 10px; color: var(--text-dim); line-height: 1.2; min-height: 26px; margin: 2px 0; }
  .unit-card .stat-row {
    display: flex; flex-wrap: nowrap; gap: 0 4px; justify-content: center;
    font-size: 9.5px; color: var(--text); margin-top: 2px; border-top: 1px solid #ffffff14; padding-top: 5px; width: 100%;
    white-space: nowrap; overflow: hidden;
  }
  .unit-card .stat-row span { flex-shrink: 0; }
  .unit-card .stat-row b { color: var(--accent); font-weight: 700; }
  .stat-legend-grid {
    display: grid; grid-template-columns: auto auto; gap: 4px 20px; width: fit-content;
    font-size: 12px; color: #000; padding: 0; margin: 0 auto; text-align: left;
  }

  #screen-levels { padding: 16px; gap: 10px; align-items: center; }
  #screen-levels h2 { margin: 6px 0 10px; }
  .level-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 360px; }
  .level-btn {
    width: 70px; height: 70px; border-radius: 12px; border: 2px solid transparent;
    background: var(--panel); color: var(--text); font-size: 20px; font-weight: 700; cursor: pointer;
  }
  .level-btn.locked { opacity: 0.35; cursor: default; }
  .level-btn.cleared { border-color: var(--good); }
  .back-link { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 16px; cursor: pointer; }

  #screen-shop { padding: 16px; gap: 10px; overflow-y: auto; }
  .shop-header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 340px; margin: 0 auto; }
  .shop-back-btn { color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer; padding: 6px 4px; }
  #screen-shop h2 { margin: 6px 0; text-align: left; }
  .shop-gold { text-align: center; color: var(--accent); font-size: 20px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .shop-row {
    display: flex; align-items: center; gap: 12px; background: rgba(36,51,28,0.75);
    border-radius: 12px; padding: 10px 12px; cursor: pointer;
  }
  .shop-row.disabled { opacity: 0.4; cursor: default; }
  .shop-row .icon { font-size: 34px; width: 44px; text-align: center; }
  .shop-row .info { flex: 1; }
  .shop-row .info .name { font-size: 14px; font-weight: 600; }
  .shop-row .info .desc { font-size: 11px; color: var(--text-dim); }
  .shop-row .price { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; display: flex; align-items: center; gap: 2px; }

  #battle-controls {
    position: absolute; top: 11%; right: 8px;
    display: flex; gap: 8px; z-index: 20;
  }
  .ctrl-btn {
    border: 2px solid rgba(255,255,255,0.55); border-radius: 9px;
    background: transparent; color: #fff;
    width: 42px; height: 36px; font-size: 17px; cursor: pointer;
    text-shadow: 0 1px 3px #000;
  }
  .ctrl-btn-shop { font-size: 18px; width: 46px; height: 38px; }

  #wave-counter, #kill-values {
    position: absolute; top: 10%; z-index: 20;
    background: transparent;
    padding: 7px 10px;
    font-size: 16px; color: #fff; line-height: 1.7;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  #wave-counter {
    position: absolute; top: 19%; right: 8px; z-index: 20;
    background: transparent; padding: 4px;
    display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end;
    max-width: 160px;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  #kill-values {
    position: absolute; top: 12%; left: 8px; z-index: 20;
    background: transparent; padding: 6px 8px;
    font-size: 17px; color: #fff; line-height: 1.9;
    text-shadow: 0 1px 4px #000, 0 1px 4px #000;
  }
  .mini-stat-line { display: block; }
  .mini-stat-label { color: var(--text-dim); margin-bottom: 3px; display: block; font-size: 11px; }
  #battle-top {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: transparent; gap: 10px;
  }
  .base-hp-wrap { flex: 1; }
  .base-hp-label { font-size: 15px; color: #fff; text-shadow: 0 1px 4px #000, 0 1px 4px #000; font-weight: 600; }
  .base-hp-track { height: 10px; border-radius: 5px; background: #00000040; overflow: hidden; margin-top: 2px; }
  .base-hp-fill { height: 100%; border-radius: 5px; transition: width 0.2s; }
  .base-hp-fill.player { background: var(--player); }
  .base-hp-fill.enemy { background: var(--enemy); }
  #battle-level-label { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; text-align: center; text-shadow: 0 1px 4px #000, 0 1px 4px #000; }
  #battle-gold { font-size: 15px; font-weight: 600; color: var(--accent); text-align: center; white-space: nowrap; text-shadow: 0 1px 3px #000; display: flex; align-items: center; justify-content: center; gap: 4px; }

  .tent {
    position: absolute; bottom: 27%; width: 48%; height: 54%;
    min-width: 120px; max-width: 280px; pointer-events: none;
    z-index: 73;
  }
  .tent.player { left: -22%; }
  .tent.enemy { right: -22%; }
  .tent img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; }

  .coin-fly {
    position: absolute; display: flex; align-items: center; gap: 3px;
    pointer-events: none; z-index: 110;
  }
  .coin-fly img { width: 26px; height: 26px; object-fit: contain; }
  .coin-fly .coin-value { font-size: 11px; color: var(--accent); font-weight: 700; text-shadow: 0 1px 2px #000; }

  #lane-wrap {
    flex: 1; position: relative; overflow: hidden;
  }
  #lane-wrap::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background-image: var(--fight-bg);
    background-size: auto 135%; background-position: center bottom; background-repeat: no-repeat;
    filter: brightness(1.18) saturate(1.05);
  }
  #hills-svg { display: none; }
  .unit { z-index: 1; }
  .unit {
    position: absolute; width: 46px; height: 46px; margin-left: -23px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; transition: left 0.15s linear, bottom 0.2s ease;
    border: 3px solid #00000030; overflow: visible;
  }
  .unit.side-player { background: var(--player); }
  .unit.side-enemy { background: var(--enemy); }
  .unit .hp-track { position: absolute; top: -10px; left: 2px; right: 2px; height: 4px; background: #00000050; border-radius: 2px; }
  .unit .hp-fill { height: 100%; border-radius: 2px; background: var(--good); }
  .unit.side-player .hp-fill { background: var(--player); }
  .unit.side-enemy .hp-fill { background: var(--enemy); }
  /* unit-halo убран по запросу — эллипс под ногами не нужен */
  .unit:not(.sprite-unit).attacking { animation: unitPunch 0.25s ease-out; }
  @keyframes unitPunch { 0%,100% { transform: scale(1); } 50% { transform: scale(1.22); } }
  .unit.dying { animation: unitDie 0.35s ease-in forwards; }
  @keyframes unitDie { to { opacity: 0; transform: scale(0.3) rotate(40deg); } }

  /* Юниты со спрайтами */
  .unit.sprite-unit {
    width: 38px; height: 4px; margin-left: -19px;
    background: transparent !important; border: none !important; border-radius: 0 !important;
    font-size: 0 !important;
  }
  .unit.sprite-unit .hp-track { top: -50px; left: 0; right: 0; }
  /* Мамонт/рыцарь и птеродактиль/дракон крупнее базового спрайта — наездник
     на них иначе выглядит слишком мелким рядом с пехотой/лучником. Сама
     высота теперь ставится динамически в JS (SPRITE_RATIO × naturalHeight),
     не статичным CSS-значением — см. STONEAGE_ASSET_PIPELINE.md, раздел 8:
     разные фазы (ходьба/атака/смерть) имеют разный холст с разным полем,
     фиксированная высота картинки исказила бы откалиброванный зазор до пола. */
  .unit.sprite-of-Mammoth .hp-track { top: -92px; }
  .unit.sprite-of-Flyer .hp-track { top: -100px; }
  .unit-sprite {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: auto; pointer-events: none;
  }
  .unit-sprite.flipped { transform: translateX(-50%) scaleX(-1); }
  .unit.sprite-unit.dying .unit-sprite { animation: deathBlink 1.1s steps(1,end) forwards; }
  .unit.sprite-unit.dying-fall .unit-sprite:not(.flipped) {
    animation: deathBlink 1.3s steps(1,end) forwards, deathFallMove 1.3s ease-in forwards;
  }
  .unit.sprite-unit.dying-fall .unit-sprite.flipped {
    animation: deathBlink 1.3s steps(1,end) forwards, deathFallMoveFlipped 1.3s ease-in forwards;
  }
  .unit.sprite-unit.dying, .unit.sprite-unit.dying-fall { animation: none; }
  @keyframes deathBlink {
    0%, 20%, 40%, 60% { opacity: 1; }
    10%, 30%, 50% { opacity: 0.15; }
    70%, 100% { opacity: 0; }
  }
  @keyframes deathFallMove { to { transform: translateX(-50%) translateY(70px); } }
  @keyframes deathFallMoveFlipped { to { transform: translateX(-50%) scaleX(-1) translateY(70px); } }

  #battle-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
    background: transparent; padding: 4px 12px 8px;
  }
  #food-bar-wrap { margin-bottom: 4px; }
  #food-label { font-size: 15px; font-weight: 600; color: #fff; display: flex; justify-content: space-between; text-shadow: 0 1px 3px #000; }
  #food-track { height: 6px; border-radius: 4px; background: #00000040; overflow: hidden; margin-top: 2px; }
  #food-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.1s linear; }

  #unit-buttons { display: flex; gap: 6px; }
  .spawn-btn {
    flex: 1; border: 2px solid rgba(255,255,255,0.35); border-radius: 10px;
    background: rgba(255,255,255,0.05); color: var(--text);
    padding: 4px 4px 3px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 0px;
    cursor: pointer;
  }
  .spawn-btn .ic { font-size: 36px; }
  .spawn-btn .cost { color: var(--accent); font-size: 11px; font-weight: 600; text-shadow: 0 1px 2px #000; }
  .spawn-btn.disabled { opacity: 0.35; }
  .spawn-btn.locked { opacity: 0.25; }

  #battle-result {
    position: absolute; inset: 0; background: #00000080; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; padding: 20px;
    z-index: 100;
  }

  .projectile {
    position: absolute; pointer-events: none; z-index: 15;
    width: 38px; height: auto; object-fit: contain;
    transition: left 0.35s linear, opacity 0.35s ease-in;
  }
  /* PNG defringe helper — убрано, т.к. drop-shadow усиливает видимость белого контура */
  #battle-result.show { display: flex; }
  #battle-result h2 { font-size: 26px; margin: 0; }
  #battle-result p { color: var(--text-dim); margin: 0; font-size: 13px; }
  .result-btn {
    padding: 12px 28px; border-radius: 12px; border: none; background: var(--accent);
    color: #2a2010; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .result-btn-secondary { background: var(--panel); color: var(--text); font-weight: 500; font-size: 14px; }

  .legend-item .desc b { color: var(--text); font-size: 12px; }

  .epoch-tabs { display: flex; gap: 8px; width: 100%; max-width: 320px; margin: 0 auto 4px; }
  .epoch-tab {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent;
    background: var(--panel); color: var(--text-dim); font-size: 12px; cursor: pointer;
  }
  .epoch-tab.active { border-color: var(--accent); color: var(--text); font-weight: 700; }
  .epoch-tab.locked { opacity: 0.35; cursor: default; }

  .stars-row .price { color: #ffd966; }
  .shop-section-gap { height: 18px; border-top: 1px solid #ffffff14; margin-top: 6px; }
  .shop-sticky-top {
    position: sticky; top: 0; z-index: 30; background: rgba(26,38,20,0.6);
    padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .shop-row.loading .price { font-size: 18px; }

  /* Оверлей паузы */
  #pause-overlay {
    position: absolute; inset: 0; z-index: 90; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
  }
  #pause-overlay.show { display: flex; }
  #pause-overlay-icon {
    font-size: 72px; color: #fff; text-shadow: 0 2px 8px #000;
    transition: opacity 0.7s ease;
  }
  #pause-overlay-icon.faded { opacity: 0.35; }
  #pause-overlay-icon.play-fade { opacity: 0; transition: opacity 1.0s ease; }

  #splash-screen {
    position: fixed; inset: 0; z-index: 1000;
    display: none; align-items: center; justify-content: center;
    background: #000;
  }
  #splash-screen.show { display: flex; }
  #splash-screen img { width: 100%; height: 100%; object-fit: cover; }
  #splash-spinner {
    position: absolute; bottom: 14%; left: 50%; transform: translateX(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.25); border-top-color: #fff;
    animation: splashSpin 0.8s linear infinite;
  }
  @keyframes splashSpin { to { transform: translateX(-50%) rotate(360deg); } }

  /* Фоны экранов меню/магазина/боя — по эпохе, задаются JS через style.backgroundImage */
  #screen-menu, #screen-shop { background-size: cover; background-position: center; }

</style>
</head>
<body>
<div id="splash-screen">
  <img id="splash-img" src="" alt="">
  <div id="splash-spinner"></div>
</div>
<div id="app">

  <div class="screen active" id="screen-menu">
    <div id="menu-header-fixed">
      <div id="menu-title-row">
        <h1 id="menu-title">🏔️ Каменный век</h1>
        <span id="menu-gold-display"></span>
      </div>
      <div class="epoch-tabs" id="epoch-tabs-menu"></div>

      <div id="menu-info-tabs">
        <button class="menu-info-tab active" id="menu-tab-hq" onclick="switchMenuTab('hq')">Штаб</button>
        <button class="menu-info-tab" id="menu-tab-units" onclick="switchMenuTab('units')">Воины</button>
      </div>
    </div>
    <div id="menu-scroll">
      <div id="menu-hq-content">
        <div class="menu-hq-spacer" style="flex-grow:8;"></div>
        <div id="menu-secondary-row">
          <button class="menu-sec-btn" id="btn-reset-progress">
            <span class="sec-icon">↺</span>
            <span>Сброс</span>
          </button>
          <button class="menu-sec-btn" id="btn-go-shop">
            <span class="sec-icon">🛒</span>
            <span>Магазин</span>
          </button>
        </div>
      </div>
      <div id="menu-unit-legend" style="display:none;"></div>
    </div>
    <div id="menu-footer-fixed">
      <button class="menu-btn" id="btn-go-levels">В бой! <span class="gold" id="menu-gold" style="display:none;"></span></button>
    </div>
  </div>

  <div class="screen" id="screen-levels">
    <h2>Выбор уровня</h2>
    <div class="epoch-tabs" id="epoch-tabs-levels"></div>
    <div class="level-row" id="level-row"></div>
    <div class="back-link" data-back="menu">‹ В меню</div>
  </div>

  <div class="screen" id="screen-shop">
    <div class="shop-sticky-top">
      <div class="shop-header-row">
        <h2 style="margin:6px 0;">Магазин</h2>
        <span class="shop-back-btn" data-back="menu">‹ В меню</span>
      </div>
      <div class="epoch-tabs" id="epoch-tabs-shop" style="margin-bottom:0;"></div>
      <div class="shop-gold" id="shop-gold-label" style="margin-bottom:0;"></div>
    </div>
    <div id="shop-list"></div>
  </div>

  <div class="screen" id="screen-battle">
    <div id="lane-wrap">
      <svg id="hills-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M0,75 L8,40 L15,65 L24,22 L34,58 L45,32 L55,62 L66,26 L76,58 L87,38 L100,68 L100,100 L0,100 Z"
              fill="#1a2440" opacity="0.6"/>
      </svg>

      <div id="battle-top">
        <div class="base-hp-wrap">
          <div class="base-hp-label">Твоя база</div>
          <div class="base-hp-track"><div class="base-hp-fill player" id="hp-player"></div></div>
        </div>
        <div>
          <div id="battle-level-label"></div>
          <div id="battle-gold">🪙 0</div>
        </div>
        <div class="base-hp-wrap">
          <div class="base-hp-label" style="text-align:right;">Вражеская база</div>
          <div class="base-hp-track"><div class="base-hp-fill enemy" id="hp-enemy"></div></div>
        </div>
      </div>

      <div id="battle-controls">
        <button class="ctrl-btn" id="btn-exit-battle">✕</button>
        <button class="ctrl-btn" id="btn-pause">⏸</button>
        <button class="ctrl-btn" id="btn-speed">1x</button>
      </div>
      <div id="wave-counter"></div>
      <div id="kill-values"></div>

      <div class="tent player" id="tent-player"></div>
      <div class="tent enemy" id="tent-enemy"></div>
      <div id="pause-overlay"><div id="pause-overlay-icon">⏸</div></div>
      <div id="battle-result">

/* Корень ассетов текущей эпохи, например "assets/stone/" */
function epochAssetRoot(epochKey) {
  return "assets/" + EPOCHS[epochKey || SAVE.currentEpoch].assetKey + "/";
}
/* Путь к ассету текущей (или явно указанной) эпохи, напр. A("ui/Coin_1.png") */

}

  const ep = EPOCHS[key];
  UNIT_DEFS = ep.unitDefs;
  UNIT_ORDER = ep.unitOrder;
  LEVELS = ep.levels;
  GOLD_PER_KILL = ep.goldPerKill;

    foodRate: A("icons/Upgrade_1.png", key),

    defense:  A("icons/Upgrade_5.png", key),
  };
  applyEpochBackgrounds(key);
}

const SAVE_KEY = "stoneage_save_v2";
const SAVE_KEY_OLD = "stoneage_save_v1"; // формат до введения эпох — для миграции

const ENEMY_LEVEL = { hpMul: 0.56, atkMul: 0.58, foodMul: 1.25 };

function freshEpochState(epochKey) {
  const ep = EPOCHS[epochKey];
  const unlocked = {};
  ep.unitOrder.forEach((k) => { unlocked[k] = !!ep.unitDefs[k].alwaysUnlocked; });
  const upgrades = {};
  Object.keys(ep.upgradeDefs).forEach((k) => { upgrades[k] = 0; });
  return { clearedLevels: 0, levelBestStars: {}, unlocked, upgrades };
}

const DEFAULT_SAVE = {
  gold: 0,
  currentEpoch: "stone",

  starsUpgrades: { startFood: 0, bonusGold: 0, unitSpeed: 0, crit: 0 },
  epochs: {
    stone: freshEpochState("stone"),
    medieval: freshEpochState("medieval"),
  },
};

const memoryStore = {};
const safeStorage = {
  getItem(key) { try { return localStorage.getItem(key); } catch (e) { return memoryStore[key] ?? null; } },
  setItem(key, value) { try { localStorage.setItem(key, value); } catch (e) { memoryStore[key] = value; } },
};

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function loadSave() {
  let raw = safeStorage.getItem(SAVE_KEY);
  let data = null;
  if (raw) {
    try { data = JSON.parse(raw); } catch (e) { data = null; }
  }

  // Новый формат уже есть — аккуратно подмешиваем дефолты (на случай новых полей)
  if (data && data.epochs) {
    const merged = deepClone(DEFAULT_SAVE);
    merged.gold = data.gold ?? 0;
    merged.difficulty = data.difficulty || "normal";
    merged.currentEpoch = data.currentEpoch || "stone";

    merged.starsUpgrades = Object.assign({}, DEFAULT_SAVE.starsUpgrades, data.starsUpgrades);
    // обратная совместимость: раньше это были true/false, теперь уровень 0-5
    ["startFood", "bonusGold"].forEach((k) => {
      if (merged.starsUpgrades[k] === true) merged.starsUpgrades[k] = 1;
      if (merged.starsUpgrades[k] === false) merged.starsUpgrades[k] = 0;
    });
    EPOCH_ORDER.forEach((epKey) => {
      const fresh = freshEpochState(epKey);
      const epData = (data.epochs && data.epochs[epKey]) || {};
      merged.epochs[epKey] = {
        clearedLevels: epData.clearedLevels || 0,
        levelBestStars: Object.assign({}, epData.levelBestStars),
        unlocked: Object.assign({}, fresh.unlocked, epData.unlocked),
        upgrades: Object.assign({}, fresh.upgrades, epData.upgrades),
      };
    });    return merged;
  }

  // Старый формат (одна эпоха, до этого обновления) — мигрируем без потери прогресса
  const oldRaw = safeStorage.getItem(SAVE_KEY_OLD);
  if (oldRaw) {
    try {
      const old = JSON.parse(oldRaw);
      const migrated = deepClone(DEFAULT_SAVE);
      migrated.gold = old.gold ?? 0;
      migrated.currentEpoch = "stone";
      migrated.epochs.stone.clearedLevels = old.clearedLevels || 0;
      migrated.epochs.stone.unlocked = Object.assign({}, migrated.epochs.stone.unlocked, old.unlocked);
      migrated.epochs.stone.upgrades = Object.assign({}, migrated.epochs.stone.upgrades, old.upgrades);
      return migrated;
    } catch (e) { /* поломанный старый сейв — игнорируем, начинаем с чистого */ }
  }

  return deepClone(DEFAULT_SAVE);
}

function writeSave(save) { safeStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

const el = (id) => document.getElementById(id);
let UPGRADE_ICON_SRCS = {}; // заполняется в applyEpoch() ниже

applyEpoch(SAVE.currentEpoch);

function EP(epochKey) { return SAVE.epochs[epochKey || SAVE.currentEpoch]; }

function upgradeCost(key) {
  const def = UPGRADE_DEFS[key];
  const lvl = EP().upgrades[key] || 0;
  return Math.round(def.baseCost * Math.pow(def.mul, lvl));
}

function dmgMul() { return 1 + 0.05 * (EP().upgrades.dmg || 0); }
function hpMul() { return 1 + 0.05 * (EP().upgrades.hp || 0); }
function baseHpBonus() { return 20 * (EP().upgrades.baseHp || 0); }
function foodRateMul() { return 1 + 0.1 * (EP().upgrades.foodRate || 0); }
function defenseMul() { return Math.max(0.2, 1 - 0.04 * (EP().upgrades.defense || 0)); }
function unitSpeedMul() { return 1 + 0.1 * (SAVE.starsUpgrades.unitSpeed || 0); }
function critChance() { return Math.min(0.6, 0.05 * (SAVE.starsUpgrades.crit || 0)); }

/* ============ Заставка загрузки ============
   Показывается: (1) при старте игры, до появления меню; (2) перед каждым
   стартом боя (уровень, "Дальше", "Повторить" и т.п.). Не менее 1 секунды
   даже если ассеты уже в кэше браузера. Картинка заставки общая на игру
   (не по эпохам) — assets/shared/splash.png. */
const SPLASH_MIN_MS = 2000;
let splashImgSet = false;

function preloadImages(srcs) {
  return Promise.all(srcs.map((src) => new Promise((resolve) => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve; // не блокируем показ игры, если один из ассетов не загрузился
    img.src = src;

}

function triggerHitHaptic() {

/* Маппинг типов юнитов → имя спрайта */
const SPRITE_MAP = {
  infantry: "Warrior", archer: "Archer", mammoth: "Mammoth", flyer: "Flyer",
  swordsman: "Warrior", crossbow: "Archer", knight: "Mammoth", dragon: "Flyer",
};

/* RATIO = целевая_высота_на_экране / рост_силуэта_на_кадре_ходьбы (см.
   STONEAGE_ASSET_PIPELINE.md, раздел 3 "Зазор до пола"). Пересчитано под
   целевые 44/44/65/51px (старые размеры до многокадровой системы) —
   поправить здесь, если понадобится другой размер (одна точка изменения). */
const SPRITE_RATIO = {
  Warrior: 0.1841,
  Archer:  0.1811,
  Mammoth: 0.3234,
  Flyer:   0.2982,
};

/* Размеры холста (naturalWidth x naturalHeight) по (персонаж, фаза) — нужны
   чтобы выставлять CSS-высоту СИНХРОННО, до загрузки картинки браузером.
   Без этого при каждой смене src кадр на долю секунды показывается в
   нативном (огромном) размере файла, потом "прыгает" до нужного через
   onload — заметная вспышка при каждом новом заспавненном юните. */
const SPRITE_CANVAS_SIZE = {
  Warrior: { walk: [222,249], attack: [514,315], death: [523,327] },
  Archer:  { walk: [200,275], attack: [247,274], death: [507,278] },
  Mammoth: { walk: [207,242], attack: [245,264], death: [322,241] },
  Flyer:   { walk: [249,294], attack: [304,322], death: [255,288] },
};

/* Ставит кадр спрайта юниту: путь + высота СИНХРОННО, без мигания размера
   при загрузке. Единая точка для всех мест, где меняется src спрайта. */
function setUnitSpriteFrame(unit, phase, frame) {
  if (!unit.spriteEl || !unit.spriteName) return;
  const ratio = SPRITE_RATIO[unit.spriteName] || 0.2;
  const size = SPRITE_CANVAS_SIZE[unit.spriteName][phase];
  if (size) unit.spriteEl.style.height = (size[1] * ratio) + "px";
  unit.spriteEl.src = spriteFramePath(unit.spriteName, unit.spriteSide, phase, frame);
}

/* Число кадров по фазам для каждого спрайта — своё у птеродактиля (9 кадров
   ходьбы вместо 12), см. STONEAGE_ASSET_PIPELINE.md раздел 9 за источником. */
const SPRITE_FRAME_COUNTS = {
  Warrior: { walk: 12, attack: 6, death: 4 },
  Archer:  { walk: 12, attack: 6, death: 4 },
  Mammoth: { walk: 12, attack: 6, death: 4 },
  Flyer:   { walk: 9,  attack: 6, death: 4 },
};

const ANIM_FRAME_MS = 150;         // между кадрами ходьбы/атаки/смерти (легко поменять)
const DEATH_HOLD_MS = 700;         // пауза на последнем кадре смерти у наземных перед миганием
const DEATH_BLINK_MS_GROUND = 1100;
const DEATH_BLINK_MS_FLYER = 1300; // у летающих длиннее — падение идёт одновременно
const FLYER_FALL_FROM_FRAME = 2;   // с какого кадра смерти птеродактиль начинает "падать"
const FLYER_FALL_PX_PER_FRAME = 7; // было 18, уменьшено в 2.5 раза по просьбе

    const portraitStyle = spriteName ? ' style="height:' + portraitHeight + 'px;"' : '';
    const portraitId = spriteName ? ' id="cardimg-' + key + '" data-sprite="' + spriteName + '"' : '';
    card.innerHTML =
      (portraitSrc ? '<img class="portrait"' + portraitId + portraitStyle + ' src="' + portraitSrc + '">' : '<div style="font-size:44px;">' + def.icon + '</div>') +

      '</div>';
    grid.appendChild(card);
  });

  spacerTop.style.flexGrow = "1";

/* Общая функция для Stars-инвойса — используется в buyWithStars,
   topUpWithStars и рекламных апгрейдах. Логирует любой статус для диагностики. */
function openStarsInvoice({ title, description, payload, amount, onPaid }) {
  if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.openInvoice) {
    window.alert("Покупка за Telegram Stars работает только внутри приложения Telegram.");
    return;
  }
  fetch("https://api.telegram.org/bot" + ANALYTICS_BOT_TOKEN + "/createInvoiceLink", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title, description, payload, currency: "XTR",
      prices: [{ label: title, amount }],
    }),
  }).then((r) => r.json()).then((data) => {
    if (!data.ok) { window.alert("Не удалось создать счёт на оплату. Ошибка: " + (data.description || "?")); return; }
    window.Telegram.WebApp.openInvoice(data.result, (status) => {
      // Диагностика: логируем любой статус, не только "paid"
      sendAnalytics("⭐ Stars invoice статус: " + status + " | payload: " + payload + " | " + getPlayerLabel());
      if (status === "paid") onPaid();
    });
  }).catch((e) => { window.alert("Ошибка сети при создании счёта: " + e.message); });
}

function buyWithStars(key, def) {
  const lvl = SAVE.starsUpgrades[key] || 0;
  if (lvl >= def.max) return;
  const cost = starsUpgradeCost(def, lvl);
  openStarsInvoice({
    title: def.name,
    description: def.desc,
    payload: key + ":" + (lvl + 1),
    amount: cost,
    onPaid: () => {
      SAVE.starsUpgrades[key] = lvl + 1;
      writeSave(SAVE);
      sessionStarsPurchases.push(def.name + " уровень " + (lvl + 1));
      renderShop();
    },
  });
}

/* Дозакупка монет за звёзды когда не хватает.
   Коэффициент: 1⭐ = 10🪙, округление вверх до целой звезды. */
const STARS_TO_COINS_RATE = 10;
function topUpWithStars(deficit, onSuccess) {
  const stars = Math.ceil(deficit / STARS_TO_COINS_RATE);
  const coins = stars * STARS_TO_COINS_RATE;
  const ok = window.confirm(
    "Не хватает 🪙 " + deficit + ".\n" +
    "Докупить " + coins + " монет за ⭐" + stars + "?"
  );
  if (!ok) return;
  openStarsInvoice({
    title: "Монеты",
    description: coins + " монет для покупки в магазине",
    payload: "topup_coins:" + coins,
    amount: stars,
    onPaid: () => {
      SAVE.gold += coins;
      writeSave(SAVE);
      sessionStarsPurchases.push("Монеты +" + coins);
      renderShop();
      onSuccess && onSuccess();
    },
  });
}

/* ============ Боевой движок ============
   Позиции юнитов — координата вдоль поля от 0 до 100. Базы стоят не на самом
   краю, а с отступом — воины подходят к шатру/замку и бьют его, а не пустой край экрана. */
const BASE_POS = { player: 10, enemy: 82 }; // граница базы: юниты останавливаются здесь и атакуют
let battle = null;
let battleTimer = null;
const TICK_MS = 100;

const SIDE_COLORS = {
  player: { main: "#3a8ad9", dark: "#16243a" },
  enemy:  { main: "#d9483a", dark: "#3a1410" },
};

function startBattleInner(levelIndex) {

    levelIndex,
    levelDef,

    playerHp: 100 + baseHpBonus(),

    enemyHp: 100 * levelDef.hpMul * diff.hpMul,
    enemyHpMax: 100 * levelDef.hpMul * diff.hpMul,
    food: 15 * (SAVE.starsUpgrades.startFood || 0),
    foodCycleProgress: 0,
    foodCycleSeconds: 0.77 / (foodRateMul() * diff.foodMul),
    units: [],
    nextId: 1,
    waveQueue: levelDef.waves.slice(),
    elapsed: 0,
    over: false,
    laneCounters: {},

    spawnedByPlayer: {},

    goldEarned: 0,
  };
  el("tent-player").innerHTML = '<img src="' + A("base/Base_own_intact.png") + '" class="base-img">';
  el("tent-enemy").innerHTML = '<img src="' + A("base/Base_enemy_intact.png") + '" class="base-img">';
  el("tent-player").className = "tent player";
  el("tent-enemy").className = "tent enemy";

/* Обёртка startBattleInner — показывает заставку (не менее 1с) поверх
   прелоада фона боя и базы текущей эпохи, потом запускает сам бой. */
function startBattle(levelIndex) {
  const assets = [
    A("backgrounds/Fight.png"),

  ];

function stopBattle() {

el("btn-exit-battle").addEventListener("click", () => {
  stopBattle();
  renderMenu();
  showScreen("screen-menu");
});

el("btn-speed").addEventListener("click", () => {
  if (!battle) return;
  battle.speedMul = battle.speedMul >= 3 ? 1 : battle.speedMul + 1;
  el("btn-speed").textContent = battle.speedMul + "x";
});

el("btn-pause").addEventListener("click", () => {
  if (!battle || battle.over) return;
  battle.paused = !battle.paused;
  activeArrowEls.forEach((a) => { a.style.animationPlayState = battle.paused ? "paused" : "running"; });
  const overlay = el("pause-overlay");
  const icon = el("pause-overlay-icon");
  if (battle.paused) {
    clearInterval(battleTimer);
    battleTimer = null;
    el("btn-pause").textContent = "▶";
    icon.textContent = "⏸";
    icon.className = "";
    overlay.classList.add("show");
    // Через 0.7с бледнеет, но не исчезает полностью (см. п.15 ТЗ)
    requestAnimationFrame(() => requestAnimationFrame(() => icon.classList.add("faded")));
  } else {
    battleTimer = setInterval(battleTick, TICK_MS);
    el("btn-pause").textContent = "⏸";
    // Значок паузы пропадает, вместо него - "play", который за 1с исчезает полностью
    icon.textContent = "▶";
    icon.className = "";
    requestAnimationFrame(() => requestAnimationFrame(() => {
      icon.classList.add("play-fade");
      setTimeout(() => overlay.classList.remove("show"), 1000);
    }));
  }
});

let arrowCounter = 0;
const activeArrowEls = [];

function spawnProjectile(attacker, target) {
  const laneWrap = el("lane-wrap");
  const wrapW = laneWrap.clientWidth || 390;
  const wrapH = laneWrap.clientHeight || 700;

  // Центр силуэта юнита — по РЕАЛЬНОЙ пиксельной высоте его спрайта (разные
  // персонажи сильно отличаются по росту, фиксированный % не годится для
  // всех сразу). unit.lane% — это baseline (низ спрайта), поднимаемся на
  // половину текущей высоты спрайта вверх от него.
  function unitCenterXY(unit) {
    const baseX = unit.pos / 100 * wrapW;
    const baseY = wrapH - unit.lane / 100 * wrapH;
    const spriteH = unit.spriteEl ? (parseFloat(unit.spriteEl.style.height) || 0) : 0;
    return { x: baseX, y: baseY - spriteH / 2 };
  }

  const start0 = unitCenterXY(attacker);
  let end0;
  if (target && target.el) {
    end0 = unitCenterXY(target);
  } else {
    const tPos = attacker.side === "player" ? BASE_POS.enemy + 2 : BASE_POS.player - 2;
    end0 = { x: tPos / 100 * wrapW, y: start0.y };
  }
  const centerX = start0.x, centerY = start0.y;
  const endX = end0.x, endY = end0.y;

  // Не знаем точно, где на спрайте находится лук/рука — вместо гадания
  // стрела летит по траектории от центра силуэта к цели, но становится
  // видимой не в самом центре, а с небольшим смещением в сторону цели
  // (всё ещё в пределах силуэта юнита, ~14px).
  const dx = endX - centerX, dy = endY - centerY;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const VISIBLE_OFFSET_PX = 14;
  const startX = centerX + (dx / dist) * VISIBLE_OFFSET_PX;
  const startY = centerY + (dy / dist) * VISIBLE_OFFSET_PX;

  const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
  const startLeftPct = startX / wrapW * 100;
  const startBottomPct = (wrapH - startY) / wrapH * 100;
  const endLeftPct = endX / wrapW * 100;
  const endBottomPct = (wrapH - endY) / wrapH * 100;

  const arrow = document.createElement("img");
  arrow.className = "projectile";
  arrow.src = A("ui/Arrow_1.png");
  arrowCounter++;
  const animName = "arrowFly" + arrowCounter;
  const styleEl = document.createElement("style");
  styleEl.textContent =
    "@keyframes " + animName + " {" +
    "0% { left:" + startLeftPct + "%; bottom:" + startBottomPct + "%; opacity:1; }" +
    "58% { opacity:1; }" +
    "100% { left:" + endLeftPct + "%; bottom:" + endBottomPct + "%; opacity:0; }" +
    "}";
  document.head.appendChild(styleEl);
  arrow.style.cssText = [
    "position:absolute",
    "pointer-events:none",
    "z-index:110",
    "width:24px",
    "height:auto",
    "left:" + startLeftPct + "%",
    "bottom:" + startBottomPct + "%",
    "margin-left:-12px",
    "transform:rotate(" + angle + "deg)",
    "transform-origin:0% 50%",
    "transition:none",
    "animation:" + animName + " 0.38s linear forwards",
    "animation-play-state:" + (battle && battle.paused ? "paused" : "running"),
  ].join(";");
  laneWrap.appendChild(arrow);
  activeArrowEls.push(arrow);
  setTimeout(() => {
    arrow.remove();
    styleEl.remove();
    const i = activeArrowEls.indexOf(arrow);
    if (i >= 0) activeArrowEls.splice(i, 1);
  }, 460);
}

function renderUnitButtons() {
  const wrap = el("unit-buttons");
  wrap.innerHTML = "";
  UNIT_ORDER.forEach((key) => {
    const def = UNIT_DEFS[key];
    const unlocked = EP().unlocked[key];
    const iconSrc = UNIT_ICONS[key];
    const btn = document.createElement("button");
    btn.className = "spawn-btn" + (unlocked ? "" : " locked");
    const iconHtml = iconSrc
      ? '<img src="' + iconSrc + '" class="ic-img" style="width:46px;height:46px;object-fit:contain;">'
      : '<span class="ic">' + def.icon + '</span>';
    btn.innerHTML = iconHtml + '<span class="cost">' + coinImg(34) + def.cost + '</span>';
    btn.dataset.unit = key;
    if (unlocked) btn.addEventListener("click", () => trySpawnPlayerUnit(key));
    wrap.appendChild(btn);
  });
}

function trySpawnPlayerUnit(key) {
  if (!battle || battle.over || battle.paused) return;
  const def = UNIT_DEFS[key];
  if (battle.food < def.cost) return;
  battle.food -= def.cost;
  battle.spawnedByPlayer[key] = (battle.spawnedByPlayer[key] || 0) + 1;
  spawnUnit("player", key);
}

const GROUND_LANE_OFFSETS = [24, 27, 30, 25, 28, 31, 26];
const AIR_LANE_OFFSETS = [46, 50, 54, 48, 52];

function spawnUnit(side, key) {
  const def = UNIT_DEFS[key];
  const isEnemy = side === "enemy";
  const mulHp = isEnemy ? battle.levelDef.hpMul * battle.diff.hpMul : hpMul();
  const mulAtk = isEnemy ? battle.levelDef.atkMul * battle.diff.atkMul : dmgMul();
  const mulSpeed = isEnemy ? 1 : unitSpeedMul();
  const laneGroup = (def.isAir ? "air" : "ground") + "_" + side;
  battle.laneCounters[laneGroup] = (battle.laneCounters[laneGroup] || 0) + 1;
  const offsets = def.isAir ? AIR_LANE_OFFSETS : GROUND_LANE_OFFSETS;
  const laneIdx = (battle.laneCounters[laneGroup] - 1) % offsets.length;
  const unit = {
    id: battle.nextId++,
    side,
    type: key,
    pos: isEnemy ? BASE_POS.enemy : BASE_POS.player,
    lane: offsets[laneIdx],
    hp: def.hp * mulHp,
    hpMax: def.hp * mulHp,
    atk: def.atk * mulAtk,
    speed: def.speed * mulSpeed,
    range: def.range,
    attacks: def.attacks,
    categories: def.categories,
    isAir: def.isAir,
    facesLeft: !!def.facesLeft,
    icon: def.icon,
    cooldown: 0,
    el: null,
  };
  battle.units.push(unit);
  mountUnitEl(unit);
}

function mountUnitEl(unit) {
  const spriteName = SPRITE_MAP[unit.type];
  const node = document.createElement("div");
  node.className = "unit side-" + unit.side + (spriteName ? " sprite-unit sprite-of-" + spriteName : "");
  node.style.bottom = unit.lane + "%";
  // Глубина: юнит, чьи ноги ближе к низу экрана (меньше lane), должен
  // перекрывать того, кто дальше/выше — та же логика для палатки (z:73, см. CSS)
  node.style.zIndex = Math.round(100 - unit.lane);

  // HP-бар
  const hpDiv = document.createElement("div");
  hpDiv.className = "hp-track";
  hpDiv.innerHTML = '<div class="hp-fill"></div>';
  node.appendChild(hpDiv);

  if (spriteName) {
    // own/enemy — уже готовые (отзеркаленные и перекрашенные) наборы файлов,
    // никакой доп. логики отражения тут больше не нужно.
    const spriteSide = unit.side === "player" ? "own" : "enemy";
    unit.spriteSide = spriteSide;
    unit.spriteName = spriteName;
    unit.animPhase = "walk";
    unit.animFrame = 1;
    unit.animAccum = 0;

    const img = document.createElement("img");
    img.className = "unit-sprite";
    node.appendChild(img);
    unit.spriteEl = img;
    setUnitSpriteFrame(unit, "walk", 1);
  } else {
    const mirror = unit.facesLeft ? unit.side === "player" : unit.side === "enemy";
    const span = mirror
      ? '<span style="display:inline-block;transform:scaleX(-1);">' + unit.icon + '</span>'
      : '<span>' + unit.icon + '</span>';
    node.insertAdjacentHTML("beforeend", span);
  }

  el("lane-wrap").appendChild(node);
  unit.el = node;
  updateUnitEl(unit);
}


function updateUnitEl(unit) {
  if (!unit.el) return;
  unit.el.style.left = unit.pos + "%";
  const frac = unit.hp / unit.hpMax;
  unit.el.querySelector(".hp-fill").style.width = Math.max(0, frac * 100) + "%";
  const track = unit.el.querySelector(".hp-track");
  if (track) track.style.display = frac < 1 ? "block" : "none";
}

function targetableBy(attacker, defender) {
  return attacker.attacks.some((cat) => defender.categories.includes(cat));
}

function findNearestEnemy(unit) {
  let best = null, bestDist = Infinity;
  for (const other of battle.units) {
    if (other.side === unit.side || other.hp <= 0) continue;
    if (!targetableBy(unit, other)) continue;
    const dist = Math.abs(other.pos - unit.pos);
    if (dist < bestDist) { bestDist = dist; best = other; }
  }
  return { unit: best, dist: bestDist };
}

function battleTick() {
  if (!battle || battle.over) return;
  const sp = battle.speedMul || 1;
  battle.elapsed += (TICK_MS / 1000) * sp;

  while (battle.waveQueue.length && battle.waveQueue[0].t <= battle.elapsed) {
    const wave = battle.waveQueue.shift();
    spawnUnit("enemy", wave.type);
  }
  renderWaveCounter();

  battle.foodCycleProgress += ((TICK_MS / 1000) * sp) / battle.foodCycleSeconds;
  while (battle.foodCycleProgress >= 1) {
    battle.foodCycleProgress -= 1;
    battle.food = Math.min(999, battle.food + 1);
  }

  for (const unit of battle.units) {
    if (unit.hp <= 0) continue;
    const dir = unit.side === "player" ? 1 : -1;
    const aOff = unit.isAir ? 7 : 0;
    const baseDist = unit.side === "player" ? ((BASE_POS.enemy - aOff) - unit.pos) : (unit.pos - (BASE_POS.player + aOff));
    const { unit: target, dist } = findNearestEnemy(unit);

    const inRangeOfTarget = target && dist <= unit.range;
    const inRangeOfBase = !target && baseDist <= unit.range;

    if (inRangeOfTarget || inRangeOfBase) {
      if (unit.cooldown > 0) {
        unit.cooldown -= TICK_MS * sp;
      } else {
        unit.cooldown = 900;
        if (unit.el) { unit.el.classList.remove("attacking"); void unit.el.offsetWidth; unit.el.classList.add("attacking"); }
        // Новая атака - сброс на первый кадр анимации атаки (SPRITE_FRAME_COUNTS.attack штук)
        if (unit.spriteEl && unit.spriteName) {
          unit.animPhase = "attack";
          unit.animFrame = 1;
          unit.animAccum = 0;
          unit.spriteEl.style.transform = "";
          setUnitSpriteFrame(unit, "attack", 1);
        }
        let dmg = unit.atk;
        if (unit.side === "player" && Math.random() < critChance()) dmg *= 2;
        if (unit.categories && unit.categories.includes("ranged")) {
          spawnProjectile(unit, target);
        }
        if (target) {
          target.hp -= dmg;
          if (target.hp <= 0) onUnitKilled(target, unit);
        } else {
          if (unit.side === "player") battle.enemyHp = Math.max(0, battle.enemyHp - dmg);
          else {
            battle.playerHp = Math.max(0, battle.playerHp - dmg * defenseMul());
            triggerHitHaptic();
          }
        }
      }
    } else {
      unit.pos += dir * unit.speed * (TICK_MS / 100) * sp;
      const airOff = unit.isAir ? 7 : 0;
      unit.pos = Math.max(BASE_POS.player + airOff, Math.min(BASE_POS.enemy - airOff, unit.pos));
      // Юнит вышел из радиуса/цель исчезла - НЕ прерываем недоигранную анимацию
      // атаки на середине (см. п.22), переключаемся на ходьбу только когда
      // атака реально доиграна до последнего кадра.
      if (unit.spriteEl && unit.animPhase === "attack") {
        const atkMax = SPRITE_FRAME_COUNTS[unit.spriteName].attack;
        if (unit.animFrame >= atkMax) {
          unit.animPhase = "walk";
          unit.animFrame = 1;
          unit.animAccum = 0;
        }
      }
    }
    advanceSpriteFrame(unit, TICK_MS * sp);
    updateUnitEl(unit);
  }

  battle.units = battle.units.filter((u) => u.hp > 0);

  renderBattleHp();
  renderFood();
  checkBattleEnd();
}

/* Продвигает кадр анимации юнита (ходьба/атака) на dtMs. Смерть обрабатывается
   отдельно в onUnitKilled - там своя последовательность (кадры -> пауза/падение
   -> мигание -> удаление), не связанная с обычным тиком боя. */
function advanceSpriteFrame(unit, dtMs) {
  if (!unit.spriteEl || !unit.spriteName || !unit.animPhase || unit.animPhase === "death") return;
  const maxFrame = SPRITE_FRAME_COUNTS[unit.spriteName][unit.animPhase];
  unit.animAccum += dtMs;
  let changed = false;
  while (unit.animAccum >= ANIM_FRAME_MS) {
    unit.animAccum -= ANIM_FRAME_MS;
    unit.animFrame++;
    changed = true;
    if (unit.animFrame > maxFrame) {
      // Ходьба зацикливается; атака доигрывает и держится на последнем кадре
      // до конца кулдауна (следующая атака сама сбросит кадр на 1).
      unit.animFrame = unit.animPhase === "walk" ? 1 : maxFrame;
    }
  }
  if (changed) setUnitSpriteFrame(unit, unit.animPhase, unit.animFrame);
}

function updateGoldDisplay() {
  el("battle-gold").innerHTML = coinImg(34) + " " + SAVE.gold;
}

function spawnCoinFly(fromEl, value) {
  const wrap = el("lane-wrap");
  const goldLabel = el("battle-gold");
  const wrapRect = wrap.getBoundingClientRect();
  const fromRect = fromEl ? fromEl.getBoundingClientRect() : wrapRect;
  const goldRect = goldLabel.getBoundingClientRect();

  const coinWrap = document.createElement("div");
  coinWrap.className = "coin-fly";

  const coinImg = document.createElement("img");
  coinImg.src = A("ui/Coin_1.png");
  coinWrap.appendChild(coinImg);
  if (value > 1) {
    const valEl = document.createElement("span");
    valEl.className = "coin-value";
    valEl.textContent = "×" + value;
    coinWrap.appendChild(valEl);
  }

  // Старт: позиция убитого юнита
  coinWrap.style.cssText = "position:absolute;pointer-events:none;z-index:50;display:flex;align-items:center;gap:3px;" +
    "left:" + (fromRect.left - wrapRect.left) + "px;" +
    "top:" + (fromRect.top - wrapRect.top) + "px;";
  wrap.appendChild(coinWrap);

  // Анимация кадров монеты
  let frame = 1;
  const frameTimer = setInterval(() => {
    frame = (frame % 3) + 1;
    coinImg.src = A("ui/Coin_" + frame + ".png");
  }, 100);

  // Фаза 1: падение на дорогу (случайная X по ширине дороги)
  // Фиксированная ЛИНИЯ по Y (дорога), X — случайный вдоль неё (не одна точка)
  const roadX = wrapRect.width * (0.15 + Math.random() * 0.7);
  const roadY = wrapRect.height * 0.71; // ~дорога: 29% от низа

  requestAnimationFrame(() => {
    coinWrap.style.transition = "left 0.2s ease-out, top 0.3s cubic-bezier(.3,0,.6,1.4)";
    coinWrap.style.left = roadX + "px";
    coinWrap.style.top = roadY + "px";
  });

  // Фаза 2: полёт к счётчику золота
  setTimeout(() => {
    coinWrap.style.transition = "left 0.45s cubic-bezier(.2,.6,.3,1), top 0.45s cubic-bezier(.2,.6,.3,1), opacity 0.45s ease-in";
    coinWrap.style.left = (goldRect.left - wrapRect.left) + "px";
    coinWrap.style.top = (goldRect.top - wrapRect.top) + "px";
    coinWrap.style.opacity = "0";
  }, 900); // было 360мс — теперь монеты дольше лежат на земле

  setTimeout(() => { coinWrap.remove(); clearInterval(frameTimer); }, 1400);
}

function onUnitKilled(victim, killer) {
  if (victim.el) {
    if (victim.spriteEl && victim.spriteName) {
      const deathCount = SPRITE_FRAME_COUNTS[victim.spriteName].death;
      let frame = 1;
      victim.animPhase = "death";
      setUnitSpriteFrame(victim, "death", frame);

      const finishDeath = () => {
        if (victim.isAir) {
          // Летающие — без статичной паузы, сразу падение+мигание (существующие CSS-классы)
          victim.el.classList.add("dying-fall");
          setTimeout(() => victim.el && victim.el.remove(), DEATH_BLINK_MS_FLYER + 100);
        } else {
          // Наземные — лежат статично (последний кадр смерти), потом мигают
          setTimeout(() => { if (victim.el) victim.el.classList.add("dying"); }, DEATH_HOLD_MS);
          setTimeout(() => victim.el && victim.el.remove(), DEATH_HOLD_MS + DEATH_BLINK_MS_GROUND);
        }
      };

      if (deathCount <= 1) {
        finishDeath();
      } else {
        const cycleTimer = setInterval(() => {
          frame++;
          if (frame > deathCount) {
            clearInterval(cycleTimer);
            finishDeath();
            return;
          }
          setUnitSpriteFrame(victim, "death", frame);
          // Птеродактиль "проседает" начиная с определённого кадра смерти -
          // translateX(-50%) сохраняем (базовое центрирование спрайта), CSS-анимация
          // deathFallMove подхватит движение дальше с этой же точки, без рывка.
          if (victim.isAir && frame >= FLYER_FALL_FROM_FRAME) {
            const fallPx = (frame - FLYER_FALL_FROM_FRAME + 1) * FLYER_FALL_PX_PER_FRAME;
            victim.spriteEl.style.transform = "translateX(-50%) translateY(" + fallPx + "px)";
          }
        }, ANIM_FRAME_MS);
      }
    } else {
      victim.el.classList.add("dying");
      setTimeout(() => victim.el && victim.el.remove(), 320);
    }
  }
  if (killer.side === "player") {
    const base = GOLD_PER_KILL[victim.type] || 2;
    const reward = Math.round(base * (1 + 0.15 * (SAVE.starsUpgrades.bonusGold || 0)));
    SAVE.gold += reward;
    if (battle) battle.goldEarned = (battle.goldEarned || 0) + reward;
    writeSave(SAVE);
    updateGoldDisplay();
    spawnCoinFly(victim.el, reward);
  }
}

function renderWaveCounter() {
  const wrap = el("wave-counter");
  if (!battle.waveQueue.length) { wrap.innerHTML = ""; return; }
  const reversed = battle.waveQueue.slice().reverse();
  const ICON_SIZE = 36; // было 39, уменьшено на ~7.5% (в диапазоне 5-10%, п.12)
  const OVERLAP_PX = Math.round(ICON_SIZE * 0.3); // 30% перекрытие
  const maxShow = 10; // подобрано под max-width:160px контейнера - должно укладываться в 2 ряда
  const shown = reversed.slice(0, maxShow);
  wrap.innerHTML = "";
  if (reversed.length > maxShow) {
    const more = document.createElement("span");
    more.style.cssText = "font-size:12px;color:#fff;text-shadow:0 1px 4px #000;margin-right:2px;vertical-align:middle;line-height:30px;";
    more.textContent = "+" + (reversed.length - maxShow);
    wrap.appendChild(more);
  }
  shown.forEach((w, i) => {
    const src = UNIT_ICONS[w.type];
    const iconEl = src ? document.createElement("img") : document.createElement("span");
    if (src) { iconEl.src = src; }
    else { iconEl.textContent = UNIT_DEFS[w.type].icon; }
    iconEl.style.cssText = "width:" + ICON_SIZE + "px;height:" + ICON_SIZE + "px;object-fit:contain;display:inline-block;vertical-align:middle;" +
      "position:relative;z-index:" + (i + 1) + ";" +
      (i === 0 ? "margin-left:0;" : "margin-left:-" + OVERLAP_PX + "px;");
    wrap.appendChild(iconEl);
  });
}

function renderKillValues() {
  const lines = UNIT_ORDER.map((k) => {
    const unitIcon = UNIT_ICONS[k]
      ? '<img src="' + UNIT_ICONS[k] + '" style="width:39px;height:39px;object-fit:contain;vertical-align:middle;">'
      : UNIT_DEFS[k].icon;
    return '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">' +
      unitIcon +
      '<span style="display:flex;align-items:center;gap:3px;font-size:17px;font-weight:600;">' +
      coinImg(28) + GOLD_PER_KILL[k] +
      '</span></div>';
  });
  el("kill-values").innerHTML = lines.join("");
}

function renderBattleHp() {
  el("hp-player").style.width = Math.max(0, (battle.playerHp / battle.playerHpMax) * 100) + "%";
  el("hp-enemy").style.width = Math.max(0, (battle.enemyHp / battle.enemyHpMax) * 100) + "%";
  updateTentDamage(el("tent-player"), battle.playerHp / battle.playerHpMax, "own");
  updateTentDamage(el("tent-enemy"), battle.enemyHp / battle.enemyHpMax, "enemy");
}

/* Пороги 5 фаз базы — см. STONEAGE_CHATGPT_PROMPTS.md, раздел про базу:
   100-76% / 75-51% / 50-26% / 25-6% / 5-0%. */
function basePhaseFor(hpFraction) {
  if (hpFraction > 0.75) return "intact";
  if (hpFraction > 0.50) return "light";
  if (hpFraction > 0.25) return "medium";
  if (hpFraction > 0.05) return "heavy";
  return "destroyed";
}

function updateTentDamage(tentEl, hpFraction, side) {
  const img = tentEl.querySelector("img.base-img");
  if (!img) return;
  img.src = A("base/Base_" + side + "_" + basePhaseFor(hpFraction) + ".png");
}
function renderFood() {
  el("food-num").textContent = Math.floor(battle.food);
  el("food-fill").style.width = (battle.foodCycleProgress * 100) + "%";
  document.querySelectorAll(".spawn-btn").forEach((btn) => {
    const key = btn.dataset.unit;
    if (!EP().unlocked[key]) return;
    btn.classList.toggle("disabled", battle.food < UNIT_DEFS[key].cost);
  });
}

function checkBattleEnd() {
  if (battle.over) return;
  if (battle.playerHp <= 0) {
    battle.over = true;
    battle.deathElapsed = battle.elapsed;
    battle.deathWave = battle.levelDef.waves.length - battle.waveQueue.length;
    endBattle(false);
  } else if (battle.enemyHp <= 0) {
    battle.over = true;
    endBattle(true);
  }
}

function formatSpawnedUnits() {
  const parts = UNIT_ORDER
    .filter((k) => battle.spawnedByPlayer[k])
    .map((k) => UNIT_DEFS[k].icon + "×" + battle.spawnedByPlayer[k]);
  return parts.length ? parts.join(" ") : "никого не призвал";
}

function formatUpgradesCompact() {
  const goldPart = Object.keys(UPGRADE_DEFS).map((k) => UPGRADE_DEFS[k].icon + (EP().upgrades[k] || 0));
  const starsPart = Object.keys(STARS_UPGRADE_DEFS).map((k) => STARS_UPGRADE_DEFS[k].icon + (SAVE.starsUpgrades[k] || 0));
  return goldPart.concat(starsPart).join(" ");
}

function formatBaseHpInfo(won) {
  if (won) {
    const pct = Math.round((battle.playerHp / battle.playerHpMax) * 100);
    return "своя база цела на " + pct + "%";
  }
  const pct = Math.round((battle.enemyHp / battle.enemyHpMax) * 100);
  return "вражеская база была разрушена на " + (100 - pct) + "%";
}

function formatDeathInfo() {
  if (battle.deathWave === null) return "";
  const totalWaves = battle.levelDef.waves.length;
  return " | пал на волне " + battle.deathWave + "/" + totalWaves + " (" + battle.deathElapsed.toFixed(1) + "с)";
}

function endBattle(won) {
  clearInterval(battleTimer);
  battleTimer = null;

  const isLastLevel = battle.levelIndex === LEVELS.length - 1;
  let levelBonus = 0;
  if (won) {
    levelBonus = 25 + 6 * battle.levelIndex;
    SAVE.gold += levelBonus;
  }
  if (won && battle.levelIndex === EP().clearedLevels) {
    EP().clearedLevels = Math.min(LEVELS.length, EP().clearedLevels + 1);
  }
  let earnedStars = 0;
  if (won) {
    earnedStars = starsForHpFraction(battle.playerHp / battle.playerHpMax);
    recordLevelStars(battle.levelIndex, earnedStars);
  }
  sessionBattles++;
  writeSave(SAVE);

  sendAnalytics(
    (won ? "✅ Прошёл" : "❌ Проиграл") + " уровень " + (battle.levelIndex + 1) +
    " (" + EPOCHS[SAVE.currentEpoch].name + (won ? ", " + earnedStars + "★" : "") + ") — " + getPlayerLabel() +
    "\nЮниты: " + formatSpawnedUnits() +
    " | " + formatBaseHpInfo(won) +
    formatDeathInfo() +
    " | Прокачки: " + formatUpgradesCompact() +
    "\nСессия пока: боёв " + sessionBattles +
    " | Stars: " + (sessionStarsPurchases.length ? sessionStarsPurchases.join(", ") : "нет") +
    " | " + GAME_VERSION
  );
  updateGoldDisplay();

  const overlay = el("battle-result");
  const epochIdx = EPOCH_ORDER.indexOf(SAVE.currentEpoch);
  const nextEpochKey = EPOCH_ORDER[epochIdx + 1];
  const primaryBtn = el("result-btn-primary");

  // Блок статистики
  function makeStatBlock(val, label) {
    return '<div style="text-align:center;">' +
      '<div style="display:inline-flex;align-items:center;gap:4px;font-size:20px;font-weight:700;color:var(--accent);">' + val + '</div>' +
      '<div style="font-size:13px;color:var(--text-dim);">' + label + '</div>' +
      '</div>';
  }
  const hpPct = Math.round((battle.playerHp / battle.playerHpMax) * 100);
  const enemyHpPct = Math.round((battle.enemyHp / battle.enemyHpMax) * 100);
  const totalEarned = (battle.goldEarned || 0) + (won ? levelBonus : 0);

  if (!won) {
    el("result-icon").innerHTML = resultIconImg("Skull_1");
    el("result-title").textContent = "Поражение";
    el("result-title").style.color = "var(--bad)";
    el("result-stats").innerHTML =
      makeStatBlock(enemyHpPct + "%", "жизни вражеской базы") +
      '<div style="width:1px;background:#ffffff20;"></div>' +
      makeStatBlock(coinImg(34) + " +" + totalEarned, "заработано");
    el("result-sub").textContent = "Прокачайся в магазине и попробуй снова.";
    primaryBtn.textContent = "Повторить";
    primaryBtn.style.background = "var(--bad)";
    primaryBtn.style.color = "#fff";
    primaryBtn.onclick = () => { const lvl = battle.levelIndex; stopBattle(); startBattle(lvl); };
  } else if (!isLastLevel) {
    el("result-icon").innerHTML = resultIconImg("Cup_1");
    el("result-title").textContent = "Победа!";
    el("result-title").style.color = "var(--accent)";
    el("result-stats").innerHTML =
      makeStatBlock(coinImg(34) + " +" + totalEarned, "заработано") +
      '<div style="width:1px;background:#ffffff20;"></div>' +
      makeStatBlock(hpPct + "%", "жизни своей базы");
    el("result-sub").textContent = "Уровень " + (battle.levelIndex + 1) + " пройден.";
    primaryBtn.textContent = "Дальше →";
    primaryBtn.style.background = "var(--accent)";
    primaryBtn.style.color = "#2a2010";
    primaryBtn.onclick = () => { const next = battle.levelIndex + 1; stopBattle(); startBattle(next); };
  } else if (nextEpochKey) {
    el("result-icon").innerHTML = resultIconImg("Cup_1");
    el("result-title").textContent = "Эпоха пройдена!";
    el("result-title").style.color = "var(--accent)";
    el("result-stats").innerHTML =
      makeStatBlock(coinImg(34) + " +" + totalEarned, "заработано") +
      '<div style="width:1px;background:#ffffff20;"></div>' +
      makeStatBlock(hpPct + "%", "жизни своей базы");
    el("result-sub").textContent = EPOCHS[SAVE.currentEpoch].name + " завоёван. Дальше — " + EPOCHS[nextEpochKey].name + ".";
    primaryBtn.textContent = "Следующая эпоха →";
    primaryBtn.style.background = "var(--accent)";
    primaryBtn.style.color = "#2a2010";
    primaryBtn.onclick = () => {
      stopBattle();
      switchEpoch(nextEpochKey);
      renderLevels();
      showScreen("screen-levels");
    };
  } else {
    el("result-icon").innerHTML = resultIconImg("Cup_1");
    el("result-title").textContent = "Всё пройдено!";
    el("result-title").style.color = "var(--accent)";
    el("result-stats").innerHTML =
      makeStatBlock(coinImg(34) + " +" + totalEarned, "заработано") +
      '<div style="width:1px;background:#ffffff20;"></div>' +
      makeStatBlock(hpPct + "%", "жизни своей базы");
    el("result-sub").textContent = "Все эпохи завоёваны. Дальше — новые обновления.";
    primaryBtn.textContent = "В меню";
    primaryBtn.style.background = "var(--accent)";
    primaryBtn.style.color = "#2a2010";
    primaryBtn.onclick = () => { stopBattle(); renderMenu(); showScreen("screen-menu"); };
  }

  el("result-btn-shop").onclick = () => { stopBattle(); renderShop(); showScreen("screen-shop"); };
  el("result-btn-menu").onclick = () => { stopBattle(); renderMenu(); showScreen("screen-menu"); };

  overlay.classList.add("show");
}

/* ============ Аналитика (без сервера, через Telegram Bot API) ============
   ВАЖНО: токен бота виден любому, кто откроет исходный код страницы — это
   нормально для личного/тестового проекта на небольшую аудиторию, но если
   игра разойдётся широко, токен стоит спрятать за отдельным сервером-прокси,
   а не держать прямо в клиентском коде. Для текущего масштаба — это ок. */
const ANALYTICS_BOT_TOKEN = "8211831789:AAFHVmDgd4SNtANOXRETRB0lfEBF8tQkVIQ";
const ANALYTICS_CHAT_ID = "-5507283361";
const sessionStartedAt = Date.now();
let sessionBattles = 0;
let sessionStarsPurchases = [];

function getDeviceLabel() {
  const ua = navigator.userAgent || "";
  if (/iPhone|Android.*Mobile|Windows Phone/i.test(ua)) return "📱 смартфон";
  if (/iPad|Android(?!.*Mobile)|Tablet/i.test(ua)) return "📱 планшет";
  return "💻 компьютер";
}

function getPlayerLabel() {
  const device = getDeviceLabel();
  try {
    const u = window.Telegram && window.Telegram.WebApp &&
      window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (u) {
      return (u.first_name || "") + (u.last_name ? " " + u.last_name : "") +
        (u.username ? " (@" + u.username + ")" : "") + " [id" + u.id + "] | " + device;
    }
  } catch (e) { /* нет доступа к Telegram-контексту — открыто не из Telegram */ }
  return "Неизвестный игрок (не через Telegram) | " + device;
}

function sendAnalytics(text, keepalive) {
  try {
    fetch("https://api.telegram.org/bot" + ANALYTICS_BOT_TOKEN + "/sendMessage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: ANALYTICS_CHAT_ID, text: text }),
      keepalive: !!keepalive,
    }).catch(() => {});
  } catch (e) { }
}

sendAnalytics("🎮 Зашёл: " + getPlayerLabel() + " | " + GAME_VERSION);

window.addEventListener("pagehide", () => {
  const minutes = ((Date.now() - sessionStartedAt) / 60000).toFixed(1);
  const stoneProgress = SAVE.epochs.stone.clearedLevels + "/" + EPOCHS.stone.levels.length;
  const medievalProgress = SAVE.epochs.medieval.clearedLevels + "/" + EPOCHS.medieval.levels.length;
  const starsLine = sessionStarsPurchases.length ? sessionStarsPurchases.join(", ") : "нет";
  sendAnalytics(
    "🚪 Вышел: " + getPlayerLabel() +
    " | сессия: " + minutes + " мин" +
    " | боёв: " + sessionBattles +
    " | Каменный век: " + stoneProgress + " | Средневековье: " + medievalProgress +
    " | Stars-покупки: " + starsLine +
    " | " + GAME_VERSION,
    true
  );
});

/* ============ Инициализация Telegram WebApp ============ */
/* #app берёт высоту из Telegram.WebApp.viewportStableHeight (px), а не из CSS
   %/vh — в Telegram WebView эти проценты иногда считаются не от реально
   видимой области, из-за чего фон боя обрезался не там. */
function applyViewportHeight() {
  const tg = window.Telegram && window.Telegram.WebApp;
  const h = (tg && tg.viewportStableHeight) ? tg.viewportStableHeight : window.innerHeight;
  el("app").style.height = h + "px";
}

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
  window.Telegram.WebApp.onEvent("viewportChanged", applyViewportHeight);
}
applyViewportHeight();
window.addEventListener("resize", applyViewportHeight);

// Прелоад фона убран - логика загрузки теперь через заставку (см. showSplash)

showSplash(preloadImages([A("backgrounds/Menu.png"), "assets/shared/splash.png"])).then(() => {
  renderMenu();
});

</script>
